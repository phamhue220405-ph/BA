<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán - Diệu Linh</title>

  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/customer.css">
  <link rel="stylesheet" href="../assets/css/components.css">

  <style>
    .checkout-layout{
      display:grid;
      grid-template-columns:1fr 380px;
      gap:32px;
      align-items:start;
    }

    .checkout-section{
      margin-bottom:20px;
    }

    .checkout-section h3{
      font-size:18px;
      font-weight:700;
      margin-bottom:16px;
    }

    .checkout-product{
      display:flex;
      gap:14px;
      padding:14px 0;
      border-bottom:1px solid var(--gray-100);
    }

    .checkout-product:last-child{
      border-bottom:none;
    }

    .checkout-product img{
      width:76px;
      height:96px;
      object-fit:cover;
      border-radius:10px;
      background:var(--gray-100);
    }

    .checkout-product-name{
      font-weight:700;
      margin-bottom:6px;
    }

    .checkout-product-meta{
      font-size:13px;
      color:var(--gray-500);
      line-height:1.7;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 0;
      border-bottom:1px solid var(--gray-100);
      font-size:14px;
    }

    .summary-row.total{
      border-bottom:none;
      font-size:18px;
      font-weight:800;
      color:var(--primary);
      padding-top:16px;
    }

    .loyalty-box{
      background:#fff7fb;
      border:1px solid #ead2e5;
      border-radius:14px;
      padding:14px;
      margin-bottom:16px;
    }

    .payment-option{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border:1px solid var(--gray-200);
      border-radius:10px;
      margin-bottom:10px;
      cursor:pointer;
    }

    .payment-option input{
      width:auto;
    }

    .form-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    @media(max-width:900px){
      .checkout-layout{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/index.html" class="navbar-brand">
        <img src="/assets/images/logo.png" alt="Diệu Linh" class="site-logo">
      </a>

      <div class="navbar-nav">
        <a href="/index.html" class="nav-link">Trang chủ</a>
        <a href="/customer/products.html" class="nav-link">Sản phẩm</a>
        <a href="/customer/fitting-booking.html" class="nav-link">Đặt lịch thử</a>
      </div>

      <div class="navbar-actions">
        <a href="/customer/cart.html" class="cart-btn">
          🛒 Giỏ hàng <span class="cart-badge" style="display:none">0</span>
        </a>

        <div class="user-menu" id="userMenu">
          <button class="user-btn" onclick="toggleUserMenu()">
            <span id="userMenuLabel">👤</span> ▾
          </button>

          <div class="user-dropdown" id="userDropdown" style="display:none">
            <div id="authLinks">
              <a href="/customer/profile.html">👤 Hồ sơ</a>
              <a href="/customer/orders.html">📦 Đơn hàng</a>
              <hr>
              <a href="#" onclick="doLogout()">🚪 Đăng xuất</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>Thanh toán</h1>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div id="checkoutContent"></div>
    </div>
  </section>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/product.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/customer.js"></script>
  <script src="../assets/js/order.js"></script>
  <script src="../assets/js/seed.js"></script>

  <script>
    const session = AuthModule.requireAuth('/customer/login.html?redirect=/customer/checkout.html');

    let usedPoints = 0;
    let pointDiscount = 0;

    if (session) {
      document.getElementById('userMenuLabel').textContent = '👤 ' + session.fullName;
      CartModule.updateCartBadge(session.userId);
    }

    function toggleUserMenu() {
      const dd = document.getElementById('userDropdown');
      dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
    }

    document.addEventListener('click', e => {
      const userMenu = document.getElementById('userMenu');
      if (userMenu && !userMenu.contains(e.target)) {
        document.getElementById('userDropdown').style.display = 'none';
      }
    });

    function doLogout() {
      AuthModule.logout();
    }

    function getCustomer() {
      return CustomerModule.getById(session.userId);
    }

    function getPointConfig() {
      return CustomerModule.getPointConfig
        ? CustomerModule.getPointConfig()
        : { moneyPerPoint: 10000, pointValue: 1000 };
    }

    function getCheckoutTotal() {
      const totals = CartModule.getTotal(session.userId);
      const finalTotal = Math.max(0, totals.total - pointDiscount);

      return {
        ...totals,
        pointDiscount,
        finalTotal
      };
    }

    function renderCheckout() {
      if (!session) return;

      const items = CartModule.getCart(session.userId);
      const customer = getCustomer();
      const config = getPointConfig();
      const totals = getCheckoutTotal();
      const container = document.getElementById('checkoutContent');

      if (!items.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛒</div>
            <div class="empty-state-title">Giỏ hàng trống</div>
            <div class="empty-state-desc">Bạn cần thêm sản phẩm trước khi thanh toán</div>
            <br>
            <a href="/customer/products.html" class="btn btn-primary">Xem sản phẩm</a>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="checkout-layout">
          <div>
            <div class="card checkout-section" style="padding:24px">
              <h3>Thông tin khách hàng</h3>

              <div class="form-row">
                <div class="form-group">
                  <label>Họ và tên *</label>
                  <input type="text" id="fullName" class="form-control" value="${customer?.fullName || session.fullName || ''}">
                </div>

                <div class="form-group">
                  <label>Số điện thoại *</label>
                  <input type="tel" id="phone" class="form-control" value="${customer?.phone || ''}">
                </div>
              </div>

              <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control" value="${customer?.email || ''}">
              </div>

              <div class="form-group">
                <label>Địa chỉ nhận đồ</label>
                <input type="text" id="address" class="form-control" value="${customer?.address || ''}" placeholder="Nhập địa chỉ nhận trang phục">
              </div>
            </div>

            <div class="card checkout-section" style="padding:24px">
              <h3>Hình thức nhận đồ</h3>

              <label class="payment-option">
                <input type="radio" name="deliveryMethod" value="store" checked>
                <span>Nhận tại cửa hàng</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="deliveryMethod" value="delivery">
                <span>Giao hàng tận nơi</span>
              </label>
            </div>

            <div class="card checkout-section" style="padding:24px">
              <h3>Phương thức thanh toán</h3>

              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="cod" checked>
                <span>Thanh toán tại cửa hàng / khi nhận đồ</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="bank">
                <span>Chuyển khoản ngân hàng</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="online">
                <span>Thanh toán online</span>
              </label>
            </div>

            <div class="card checkout-section" style="padding:24px">
              <h3>Sản phẩm thuê</h3>

              ${items.map(item => `
                <div class="checkout-product">
                  <img src="${item.productImage || 'https://via.placeholder.com/100x130?text=No+Image'}" alt="${item.productName}">

                  <div style="flex:1">
                    <div class="checkout-product-name">${item.productName}</div>

                    <div class="checkout-product-meta">
                      Size: ${item.size || '—'} | Màu: ${item.color || '—'}<br>
                      Thời gian thuê: ${item.rentalStartDate} đến ${item.rentalEndDate}<br>
                      ${item.rentalDays} ngày × ${formatCurrency(item.pricePerDay)}<br>
                      Tiền cọc: ${formatCurrency(item.depositAmount)}
                    </div>
                  </div>

                  <div style="font-weight:700;color:var(--primary)">
                    ${formatCurrency(item.subtotal)}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>

          <div>
            <div class="card" style="padding:24px;position:sticky;top:20px">
              <h3 style="font-size:18px;font-weight:700;margin-bottom:20px">
                Tóm tắt thanh toán
              </h3>

              <div class="loyalty-box">
                <div style="font-size:13px;color:var(--gray-500);margin-bottom:4px">
                  Điểm tích lũy hiện có
                </div>

                <div style="font-size:24px;font-weight:800;color:var(--primary);margin-bottom:8px">
                  ${customer?.loyaltyPoints || 0} điểm
                </div>

                <div style="font-size:12px;color:var(--gray-500);margin-bottom:10px">
                  Quy đổi: 1 điểm = ${formatCurrency(config.pointValue || 0)}
                </div>

                <div style="display:flex;gap:8px">
                  <input type="number" id="usePointsInput" class="form-control" min="0" max="${customer?.loyaltyPoints || 0}" placeholder="Nhập điểm">
                  <button class="btn btn-secondary" onclick="applyPoints()">Áp dụng</button>
                </div>

                ${
                  usedPoints > 0
                  ? `<div style="font-size:13px;color:var(--success);margin-top:8px">
                      Đã dùng ${usedPoints} điểm, giảm ${formatCurrency(pointDiscount)}
                    </div>`
                  : ''
                }
              </div>

              <div class="summary-row">
                <span>Tiền thuê (${items.length} sản phẩm)</span>
                <span>${formatCurrency(totals.rentalTotal)}</span>
              </div>

              <div class="summary-row">
                <span>Tiền đặt cọc</span>
                <span>${formatCurrency(totals.depositTotal)}</span>
              </div>

              <div class="summary-row">
                <span>Giảm từ điểm tích lũy</span>
                <span>- ${formatCurrency(totals.pointDiscount)}</span>
              </div>

              <div class="summary-row total">
                <span>Tổng thanh toán</span>
                <span>${formatCurrency(totals.finalTotal)}</span>
              </div>

              <div style="font-size:12px;color:var(--gray-400);margin:12px 0 20px">
                * Tiền cọc sẽ được hoàn trả sau khi khách trả đồ đúng hạn và sản phẩm không hư hỏng.
              </div>

              <button class="btn btn-primary btn-full btn-lg" onclick="placeOrder()">
                Xác nhận đặt thuê
              </button>

              <a href="/customer/cart.html" class="btn btn-secondary btn-full" style="margin-top:10px;text-align:center">
                ← Quay lại giỏ hàng
              </a>
            </div>
          </div>
        </div>
      `;
    }

    function applyPoints() {
      const customer = getCustomer();
      const config = getPointConfig();
      const input = document.getElementById('usePointsInput');
      const points = Number(input.value);

      if (!points || points <= 0) {
        Toast.show('Số điểm sử dụng không hợp lệ', 'warning');
        return;
      }

      if (points > (customer?.loyaltyPoints || 0)) {
        Toast.show('Bạn không đủ điểm để sử dụng', 'error');
        return;
      }

      const totals = CartModule.getTotal(session.userId);
      const discount = points * Number(config.pointValue || 0);

      if (discount > totals.total) {
        Toast.show('Số điểm sử dụng vượt quá tổng giá trị đơn hàng', 'error');
        return;
      }

      usedPoints = points;
      pointDiscount = discount;

      Toast.show(`Đã áp dụng ${points} điểm`, 'success');
      renderCheckout();
    }

    function validateCheckoutForm() {
      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!fullName) return 'Vui lòng nhập họ tên';
      if (!phone) return 'Vui lòng nhập số điện thoại';

      if (!/^[0-9]{10}$/.test(phone)) {
        return 'Số điện thoại phải gồm đúng 10 chữ số';
      }

      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        return 'Email không đúng định dạng';
      }

      return '';
    }

    function placeOrder() {
      const error = validateCheckoutForm();

      if (error) {
        Toast.show(error, 'error');
        return;
      }

      const items = CartModule.getCart(session.userId);

      if (!items.length) {
        Toast.show('Giỏ hàng trống', 'warning');
        return;
      }

      const totals = getCheckoutTotal();

      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();

      const deliveryMethod = document.querySelector('input[name="deliveryMethod"]:checked').value;
      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;

      const order = StorageService.save('crb_rental_orders', {
        userId: session.userId,
        customerName: fullName,
        customerPhone: phone,
        customerEmail: email,
        customerAddress: address,
        deliveryMethod,
        paymentMethod,
        items,
        rentalTotal: totals.rentalTotal,
        depositTotal: totals.depositTotal,
        usedPoints,
        pointDiscount,
        totalAmount: totals.finalTotal,
        status: 'cho_xac_nhan',
        createdAt: new Date().toISOString()
      });

      if (usedPoints > 0) {
        CustomerModule.usePoints(session.userId, usedPoints);
      }

      CartModule.clearCart(session.userId);

      Toast.show('Đặt thuê thành công', 'success');

      setTimeout(() => {
        window.location.href = '/customer/orders.html';
      }, 800);
    }

    renderCheckout();
  </script>
</body>
</html>
