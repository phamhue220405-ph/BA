  <script>
    const session = AuthModule.requireAuth('/customer/login.html?redirect=/customer/orders.html');

    document.addEventListener('click', e => { if (!document.getElementById('userMenu').contains(e.target)) document.getElementById('userDropdown').style.display = 'none'; });
    function doLogout() { AuthModule.logout(); }

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('newOrder')) document.getElementById('newOrderAlert').style.display = 'flex';

    function filterOrders(status) {
      document.querySelectorAll('#orderTabs .tab-btn').forEach((b, i) => {
        const statuses = ['', 'cho_xac_nhan', 'da_xac_nhan', 'dang_giao', 'da_giao', 'dang_thue', 'da_tra_do', 'da_huy'];
        b.classList.toggle('active', statuses[i] === status);
      });
      renderOrders(status);
    }

    function renderOrders(statusFilter = '') {
      if (!session) return;
      let orders = OrderModule.getRentalOrders({ userId: session.userId });
      if (statusFilter) orders = orders.filter(o => o.status === statusFilter);
      const container = document.getElementById('ordersContainer');
      if (!orders.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">??</div><div class="empty-state-title">Chua c� don h�ng</div><a href="/customer/products.html" class="btn btn-primary" style="margin-top:16px">Xem s?n ph?m</a></div>';

      orders.filter(o => o.status === 'dang_thue' && o.agreedReturnDate && new Date(o.agreedReturnDate) <= in24h && new Date(o.agreedReturnDate) > now)

      container.innerHTML = orders.map(o => `

            <div>
              <div style="font-weight:700;font-size:15px">${o.orderRef}</div>
              <div style="font-size:12px;color:var(--gray-400)">${formatDate(o.createdAt)}</div>
            </div>
            <span class="status-badge status-${o.status}">${STATUS_LABELS[o.status] || o.status}</span>

          <div class="order-card-body">
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">

              ${(o.items || []).length > 3 ? `<div style="width:50px;height:65px;background:var(--gray-100);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gray-500)">+${o.items.length - 3}</div>` : ''}

      const bookings = OrderModule.getFittingBookings({ userId: session.userId });
      const container = document.getElementById('fittingsContainer');
      if (!bookings.length) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">??</div><div class="empty-state-title">Chua c� l?ch th?</div><a href="/customer/fitting-booking.html" class="btn btn-outline" style="margin-top:16px">�?t l?ch th?</a></div>'; return; }
