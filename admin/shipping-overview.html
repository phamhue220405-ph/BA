<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tổng quan vận chuyển - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">🚚 Tổng quan vận chuyển</div>
      </div>
      <div class="admin-content">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid" style="margin-bottom:28px"></div>

        <!-- Quick links -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:28px">
          <a href="/admin/shipping.html" style="text-decoration:none">
            <div class="admin-form-card" style="text-align:center;cursor:pointer;transition:box-shadow 0.2s" onmouseover="this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.boxShadow=''">
              <div style="font-size:40px;margin-bottom:12px">🚚</div>
              <div style="font-weight:700;font-size:16px;color:var(--admin-primary)">Phương thức vận chuyển</div>
              <div style="font-size:13px;color:var(--gray-500);margin-top:6px">Quản lý các đơn vị vận chuyển</div>
            </div>
          </a>
          <a href="/admin/shipping-costs.html" style="text-decoration:none">
            <div class="admin-form-card" style="text-align:center;cursor:pointer;transition:box-shadow 0.2s" onmouseover="this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.boxShadow=''">
              <div style="font-size:40px;margin-bottom:12px">💰</div>
              <div style="font-weight:700;font-size:16px;color:var(--admin-primary)">Chi phí vận chuyển</div>
              <div style="font-size:13px;color:var(--gray-500);margin-top:6px">Thiết lập phí theo khu vực</div>
            </div>
          </a>
          <a href="/admin/shipping-orders.html" style="text-decoration:none">
            <div class="admin-form-card" style="text-align:center;cursor:pointer;transition:box-shadow 0.2s" onmouseover="this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.boxShadow=''">
              <div style="font-size:40px;margin-bottom:12px">📬</div>
              <div style="font-weight:700;font-size:16px;color:var(--admin-primary)">Đơn vận chuyển</div>
              <div style="font-size:13px;color:var(--gray-500);margin-top:6px">Theo dõi & cập nhật trạng thái</div>
            </div>
          </a>
        </div>

        <!-- Recent shipping orders -->
        <div class="table-container">
          <div class="table-header">
            <span style="font-weight:700">📦 Đơn vận chuyển gần đây</span>
            <a href="/admin/shipping-orders.html" class="action-btn action-btn-view">Xem tất cả →</a>
          </div>
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead>
                <tr><th>Mã đơn</th><th>Khách hàng</th><th>Phương thức</th><th>Trạng thái giao</th><th>Ngày tạo</th></tr>
              </thead>
              <tbody id="recentTable"></tbody>
            </table>
          </div>
          <div id="pagination" style="margin-top:20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap\"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/shipping.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth();
    if (session) {
      document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('shipping-overview', session);

      const allOrders = StorageService.getAll('crb_rental_orders').filter(o => o.status !== 'da_huy');
      const methods   = ShippingModule.getAll();
      let currentOverviewPage = 1;
      const overviewPerPage = 10;

      // Stats
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-icon blue">🚚</div><div><div class="stat-value">${methods.filter(m=>m.status==='active').length}</div><div class="stat-label">Phương thức đang hoạt động</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">⏳</div><div><div class="stat-value">${allOrders.filter(o=>(o.deliveryStatus||'cho_xac_nhan')==='cho_xac_nhan').length}</div><div class="stat-label">Chờ xác nhận</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">🚚</div><div><div class="stat-value">${allOrders.filter(o=>o.deliveryStatus==='dang_giao').length}</div><div class="stat-label">Đang giao</div></div></div>
        <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value">${allOrders.filter(o=>o.deliveryStatus==='da_giao').length}</div><div class="stat-label">Đã giao</div></div></div>`;

      // Recent orders
      const DELIVERY_LABELS = { cho_xac_nhan:'Chờ xác nhận', dang_chuan_bi:'Đang chuẩn bị', dang_giao:'Đang giao', da_giao:'Đã giao', da_huy:'Đã hủy' };
      
      function renderOverviewTable() {
        const allRecent = allOrders.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
        const totalPages = Math.ceil(allRecent.length / overviewPerPage);
        if (currentOverviewPage > totalPages) currentOverviewPage = totalPages || 1;
        const startIdx = (currentOverviewPage - 1) * overviewPerPage;
        const recent = allRecent.slice(startIdx, startIdx + overviewPerPage);
        
        const tbody  = document.getElementById('recentTable');
        if (!recent.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--gray-400)">Chưa có đơn vận chuyển</td></tr>';
          document.getElementById('pagination').innerHTML = '';
        } else {
          tbody.innerHTML = recent.map(o => {
            const method = o.shippingMethodId ? ShippingModule.getById(o.shippingMethodId) : null;
            const ds = o.deliveryStatus || 'cho_xac_nhan';
            return `<tr>
              <td><a href="/admin/order-detail.html?id=${o.id}" style="color:var(--admin-primary);font-weight:600">${o.orderRef}</a></td>
              <td>${o.customerName}</td>
              <td style="font-size:13px">${method ? method.name : '—'}</td>
              <td><span class="status-badge status-${ds==='da_giao'?'da_tra_do':ds==='dang_giao'?'dang_giao':ds==='da_huy'?'da_huy':'cho_xac_nhan'}">${DELIVERY_LABELS[ds]||ds}</span></td>
              <td style="font-size:12px;color:var(--gray-400)">${formatDate(o.createdAt)}</td>
            </tr>`;
          }).join('');
          
          let html = '';
          if (currentOverviewPage > 1) html += `<button class="btn btn-sm btn-secondary" onclick="goToOverviewPage(${currentOverviewPage - 1})">← Trước</button>`;
          for (let i = 1; i <= totalPages; i++) {
            if (i === currentOverviewPage) html += `<button class="btn btn-sm btn-primary" style="background:var(--admin-primary)">${i}</button>`;
            else html += `<button class="btn btn-sm btn-secondary" onclick="goToOverviewPage(${i})">${i}</button>`;
          }
          if (currentOverviewPage < totalPages) html += `<button class="btn btn-sm btn-secondary" onclick="goToOverviewPage(${currentOverviewPage + 1})">Tiếp →</button>`;
          document.getElementById('pagination').innerHTML = html;
        }
      }
      
      function goToOverviewPage(page) {
        currentOverviewPage = page;
        renderOverviewTable();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
      
      renderOverviewTable();
    }
  </script>
</body>
</html>
