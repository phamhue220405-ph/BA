<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phương thức vận chuyển - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    .detail-panel { position:fixed; top:0; right:-480px; width:480px; height:100vh; background:#fff; box-shadow:-4px 0 24px rgba(0,0,0,0.15); z-index:200; transition:right 0.3s; display:flex; flex-direction:column; }
    .detail-panel.open { right:0; }
    .detail-panel-header { padding:20px 24px; border-bottom:1px solid var(--gray-200); display:flex; justify-content:space-between; align-items:center; }
    .detail-panel-body { flex:1; overflow-y:auto; padding:24px; }
    .detail-panel-footer { padding:16px 24px; border-top:1px solid var(--gray-200); display:flex; gap:10px; justify-content:flex-end; }
    .panel-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:199; }
    .panel-overlay.show { display:block; }
    .detail-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--gray-100); font-size:14px; }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { color:var(--gray-500); font-weight:500; }
    .detail-value { font-weight:600; color:var(--gray-800); text-align:right; max-width:60%; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">🚚 Phương thức vận chuyển</div>
        <div class="topbar-actions" id="topbarActions"></div>
      </div>
      <div class="admin-content">
        <div style="display:flex;gap:8px;margin-bottom:20px">
          <a href="/admin/shipping-overview.html" class="btn btn-secondary btn-sm">📊 Tổng quan</a>
          <a href="/admin/shipping.html" class="btn btn-primary btn-sm" style="background:var(--admin-primary)">🚚 Phương thức</a>
          <a href="/admin/shipping-costs.html" class="btn btn-secondary btn-sm">💰 Chi phí</a>
          <a href="/admin/shipping-orders.html" class="btn btn-secondary btn-sm">📬 Đơn vận chuyển</a>
        </div>
        <div class="table-container">
          <div class="table-header">
            <div class="table-search">
              <input type="text" id="searchInput" placeholder="Tìm phương thức..." oninput="renderTable()">
            </div>
            <select id="statusFilter" class="form-control" style="width:160px;padding:8px 12px;font-size:13px" onchange="renderTable()">
              <option value="">Tất cả trạng thái</option>
              <option value="active">Đang sử dụng</option>
              <option value="tam_ngung">Tạm ngừng</option>
            </select>
          </div>
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead><tr><th>Tên phương thức</th><th>Thời gian giao</th><th>Khu vực</th><th>Trạng thái</th><th>Ngày tạo</th><th>Chi tiết</th></tr></thead>
              <tbody id="shippingTable"></tbody>
            </table>
          </div>          <div id="pagination" style="margin-top:20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap"></div>
        </div>        </div>
      </div>
    </main>
  </div>

  <!-- Detail Panel -->
  <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-panel-header">
      <div style="font-weight:700;font-size:16px" id="panelTitle">Chi tiết</div>
      <button onclick="closePanel()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400)">✕</button>
    </div>
    <div class="detail-panel-body" id="panelBody"></div>
    <div class="detail-panel-footer" id="panelFooter"></div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="shippingModal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Thêm phương thức vận chuyển</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <input type="hidden" id="editId">
      <div class="form-group"><label>Tên phương thức <span class="required-star">*</span></label><input type="text" id="sName" class="form-control" placeholder="VD: Giao hàng nhanh" required></div>
      <div class="form-row">
          <div class="form-group">
            <label>Thời gian giao ước tính <span class="required-star">*</span></label>
            <input type="text" id="sDeliveryTime" class="form-control" placeholder="VD: 3-5 ngày, 1-2 ngày..." required>
            <div style="font-size:12px;color:var(--gray-400);margin-top:4px">Thời gian ước tính hiển thị cho khách hàng</div>
          </div>
          <div class="form-group"><label>Trạng thái <span class="required-star">*</span></label>
            <select id="sStatus" class="form-control" required><option value="active">Đang sử dụng</option><option value="tam_ngung">Tạm ngừng</option></select>
          </div>
      </div>
      <div class="form-group"><label>Khu vực áp dụng <span class="required-star">*</span></label>
        <div id="regionPickerWrap" style="position:relative">
          <div id="regionTrigger" onclick="toggleRegionPicker()"
            style="border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#fff;min-height:38px;gap:8px">
            <span id="regionTriggerLabel" style="color:var(--gray-400);font-size:13px;flex:1">-- Chọn khu vực --</span>
            <span style="font-size:10px;color:var(--gray-400);flex-shrink:0">▾</span>
          </div>
          <div id="regionPickerMenu"
            style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:400;max-height:320px;overflow-y:auto">
            <label style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;border-bottom:2px solid var(--gray-200);font-weight:600;background:var(--gray-50)">
              <input type="checkbox" id="regionAll" onchange="onRegionAllChange()">
              <span>🌐 Toàn quốc</span>
            </label>
            <div id="regionGroups"></div>
          </div>
        </div>
        <input type="hidden" id="sRegions">
        <div style="font-size:12px;color:var(--gray-400);margin-top:4px">Chọn tỉnh/thành hoặc tích "Toàn quốc"</div>
      </div>
      <div class="form-group"><label>Mô tả</label><textarea id="sDesc" class="form-control" rows="2"></textarea></div>
      <div id="modalError" class="alert alert-error" style="display:none"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
        <button id="saveShippingBtn" class="btn btn-primary" onclick="saveShipping()" style="background:var(--admin-primary)">Lưu</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/shipping.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth();
    if (!session) throw new Error('No session');
    document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('shipping', session);
    const _canEdit = canEdit('shipping', session.role);
    if (_canEdit) {
      document.getElementById('topbarActions').innerHTML = '<button class="topbar-btn topbar-btn-primary" onclick="openModal()">+ Thêm phương thức</button>';
    }

    let currentShippingPage = 1;
    const shippingPerPage = 10;

    function renderTable() {
      const search = document.getElementById('searchInput').value;
      const status = document.getElementById('statusFilter').value;
      const allMethods = ShippingModule.getAll({ search, status });
      const tbody = document.getElementById('shippingTable');
      
      const totalPages = Math.ceil(allMethods.length / shippingPerPage);
      if (currentShippingPage > totalPages) currentShippingPage = totalPages || 1;
      const startIdx = (currentShippingPage - 1) * shippingPerPage;
      const methods = allMethods.slice(startIdx, startIdx + shippingPerPage);
      
      if (!methods.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-400)">Không có phương thức vận chuyển</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      tbody.innerHTML = methods.map(m => {
        const daysLabel = m.deliveryTime || '<span style="color:var(--gray-400)">—</span>';
        return `<tr>
          <td style="font-weight:600">${m.name}</td>
          <td>${daysLabel}</td>
          <td style="font-size:13px;color:var(--gray-500)">${(m.regions||[]).slice(0,3).join(', ')}${(m.regions||[]).length>3?'...':''}</td>
          <td><span class="status-badge status-${m.status==='active'?'da_xac_nhan':'cho_xac_nhan'}">${m.status==='active'?'Đang sử dụng':'Tạm ngừng'}</span></td>
          <td style="font-size:12px;color:var(--gray-400)">${formatDate(m.createdAt)}</td>
          <td><button class="action-btn action-btn-view" onclick="openDetail('${m.id}')">Xem chi tiết</button></td>
        </tr>`;
      }).join('');
      
      renderShippingPagination(totalPages);
    }

    function renderShippingPagination(totalPages) {
      const paginationContainer = document.getElementById('pagination');
      let html = '';
      if (currentShippingPage > 1) html += `<button class="btn btn-sm btn-secondary" onclick="goToShippingPage(${currentShippingPage - 1})">\u2190 Trước</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === currentShippingPage) html += `<button class="btn btn-sm btn-primary" style="background:var(--admin-primary)">${i}</button>`;
        else html += `<button class="btn btn-sm btn-secondary" onclick="goToShippingPage(${i})">${i}</button>`;
      }
      if (currentShippingPage < totalPages) html += `<button class="btn btn-sm btn-secondary" onclick="goToShippingPage(${currentShippingPage + 1})">Tiếp \u2192</button>`;
      paginationContainer.innerHTML = html;
    }

    function goToShippingPage(page) {
      currentShippingPage = page;
      renderTable();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openDetail(id) {
      const m = ShippingModule.getById(id);
      if (!m) return;
      document.getElementById('panelTitle').textContent = m.name;
      document.getElementById('panelBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Tên phương thức</span><span class="detail-value">${m.name}</span></div>
        <div class="detail-row"><span class="detail-label">Thời gian giao ước tính</span><span class="detail-value">${m.deliveryTime || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">Trạng thái</span><span class="detail-value"><span class="status-badge status-${m.status==='active'?'da_xac_nhan':'cho_xac_nhan'}">${m.status==='active'?'Đang sử dụng':'Tạm ngừng'}</span></span></div>
        <div class="detail-row"><span class="detail-label">Khu vực</span><span class="detail-value">${(m.regions||[]).join(', ')||'—'}</span></div>
        <div class="detail-row"><span class="detail-label">Mô tả</span><span class="detail-value">${m.description||'—'}</span></div>
        <div class="detail-row"><span class="detail-label">Ngày tạo</span><span class="detail-value">${formatDate(m.createdAt)}</span></div>
        <hr style="margin:16px 0">
        <div style="font-weight:600;margin-bottom:12px">Chi phí & thời gian theo khu vực</div>
        ${(m.costs||[]).length
          ? `<table style="width:100%;font-size:13px;border-collapse:collapse">
              <thead><tr style="border-bottom:1px solid var(--gray-200)">
                <th style="text-align:left;padding:6px 4px;color:var(--gray-500);font-weight:500">Khu vực</th>
                <th style="text-align:right;padding:6px 4px;color:var(--gray-500);font-weight:500">Chi phí</th>
                <th style="text-align:right;padding:6px 4px;color:var(--gray-500);font-weight:500">Thời gian</th>
              </tr></thead>
              <tbody>${m.costs.map(c=>`
                <tr style="border-bottom:1px solid var(--gray-100)">
                  <td style="padding:8px 4px">${c.region}</td>
                  <td style="padding:8px 4px;text-align:right;font-weight:600;color:var(--admin-primary)">${formatCurrency(c.cost)}</td>
                  <td style="padding:8px 4px;text-align:right;color:var(--gray-600)">${c.estimatedDays != null ? c.estimatedDays + ' ngày' : '—'}</td>
                </tr>`).join('')}
              </tbody></table>`
          : '<p style="color:var(--gray-400);font-size:13px">Chưa thiết lập chi phí</p>'}`;

      const footer = document.getElementById('panelFooter');
      if (_canEdit) {
        footer.innerHTML = `
          <button class="btn btn-secondary btn-sm" onclick="toggleStatus('${m.id}','${m.status}')">${m.status==='active'?'Tạm ngừng':'Kích hoạt'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMethod('${m.id}')">Xóa</button>
          <button class="btn btn-primary btn-sm" onclick="openEdit('${m.id}')" style="background:var(--admin-primary)">Chỉnh sửa</button>`;
      } else {
        footer.innerHTML = '<span style="font-size:13px;color:var(--gray-400)">Bạn chỉ có quyền xem</span>';
      }
      document.getElementById('detailPanel').classList.add('open');
      document.getElementById('panelOverlay').classList.add('show');
    }

    function closePanel() {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('panelOverlay').classList.remove('show');
    }

    function openModal() {
      document.getElementById('editId').value = '';
      document.getElementById('sName').value = '';
      document.getElementById('sDeliveryTime').value = '';
      document.getElementById('sStatus').value = 'active';
      // Default to Toàn quốc
      document.getElementById('sRegions').value = 'Toàn quốc';
      document.getElementById('sDesc').value = '';
      document.getElementById('modalTitle').textContent = 'Thêm phương thức vận chuyển';
      document.getElementById('modalError').style.display = 'none';
      renderRegionPicker();
      applyRegionsSelection(['Toàn quốc']);
      const saveBtn = document.getElementById('saveShippingBtn');
      if (saveBtn) saveBtn.textContent = 'Lưu';
      document.getElementById('shippingModal').style.display = 'flex';
    }

    function openEdit(id) {
      closePanel();
      const m = ShippingModule.getById(id);
      if (!m) return;
      document.getElementById('editId').value = id;
      document.getElementById('sName').value = m.name;
      document.getElementById('sDeliveryTime').value = m.deliveryTime || '';
      document.getElementById('sStatus').value = m.status;
      // Populate region picker from saved regions
      renderRegionPicker();
      applyRegionsSelection(m.regions || []);
      const saveBtn = document.getElementById('saveShippingBtn');
      if (saveBtn) saveBtn.textContent = 'Cập nhật';
      document.getElementById('sDesc').value = m.description||'';
      document.getElementById('modalTitle').textContent = 'Sửa phương thức vận chuyển';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('shippingModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('shippingModal').style.display = 'none'; }

    // Regions data and picker helpers
    const REGION_GROUPS = [
      { name: 'Miền Bắc', provinces: ['Hà Nội','Hải Phòng','Quảng Ninh','Bắc Ninh','Bắc Giang','Thái Nguyên','Nam Định','Ninh Bình','Thái Bình','Hà Nam','Hưng Yên','Vĩnh Phúc','Phú Thọ','Lào Cai','Yên Bái','Sơn La','Điện Biên'] },
      { name: 'Miền Trung', provinces: ['Đà Nẵng','Quảng Nam','Quảng Ngãi','Bình Định','Phú Yên','Khánh Hòa','Ninh Thuận','Bình Thuận','Quảng Bình','Quảng Trị','Thừa Thiên-Huế','Nghệ An','Hà Tĩnh'] },
      { name: 'Miền Nam', provinces: ['TP.HCM','Cần Thơ','Đồng Nai','Bình Dương','Bà Rịa - Vũng Tàu','Long An','Tiền Giang','Bến Tre','Vĩnh Long','Trà Vinh','An Giang','Kiên Giang','Đồng Tháp','Sóc Trăng','Bạc Liêu','Cà Mau','Tây Ninh','Bình Phước'] }
    ];

    function renderRegionPicker() {
      const wrap = document.getElementById('regionGroups');
      if (!wrap) return;
      let html = '';
      REGION_GROUPS.forEach(g => {
        html += `<div style="padding:8px;border-bottom:1px solid var(--gray-100)">`;
        html += `<label style="display:flex;align-items:center;gap:8px;font-weight:600"><input type=\"checkbox\" class=\"groupCheckbox\" data-group=\"${g.name}\" onchange=\"onGroupToggle('${g.name}',this)\"> ${g.name}</label>`;
        html += `<div style=\"padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px\">`;
        g.provinces.forEach(p => {
          const safe = p.replace(/"/g, '&quot;');
          html += `<label style=\"display:flex;align-items:center;gap:8px;padding:4px 0\"><input type=\"checkbox\" class=\"provinceCheckbox\" data-province=\"${safe}\" onchange=\"onProvinceToggle('${safe}',this)\">${p}</label>`;
        });
        html += `</div></div>`;
      });
      wrap.innerHTML = html;
      // reset regionAll checkbox if not present
      const allCb = document.getElementById('regionAll');
      if (allCb) allCb.checked = false;
      updateRegionTriggerLabel();
    }

    function toggleRegionPicker() {
      const menu = document.getElementById('regionPickerMenu');
      if (!menu) return;
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
      if (menu.style.display === 'block') {
        setTimeout(()=>document.addEventListener('click', closeRegionPickerOnOutsideClick));
      }
    }

    function closeRegionPickerOnOutsideClick(e) {
      const menu = document.getElementById('regionPickerMenu');
      const wrap = document.getElementById('regionPickerWrap');
      if (!menu || !wrap) return;
      if (!wrap.contains(e.target)) {
        menu.style.display = 'none';
        document.removeEventListener('click', closeRegionPickerOnOutsideClick);
      }
    }

    function onRegionAllChange() {
      const all = document.getElementById('regionAll').checked;
      const provinces = Array.from(document.querySelectorAll('.provinceCheckbox'));
      provinces.forEach(cb => { cb.checked = false; });
      Array.from(document.querySelectorAll('.groupCheckbox')).forEach(g=>g.checked=false);
      document.getElementById('sRegions').value = all ? 'Toàn quốc' : '';
      updateRegionTriggerLabel();
    }

    function onGroupToggle(groupName, el) {
      const checked = el.checked;
      const group = REGION_GROUPS.find(g => g.name === groupName);
      if (!group) return;
      group.provinces.forEach(p => {
        const cb = Array.from(document.querySelectorAll('.provinceCheckbox')).find(x => x.dataset.province === p);
        if (cb) cb.checked = checked;
      });
      document.getElementById('regionAll').checked = false;
      syncHiddenRegions();
    }

    function onProvinceToggle(province, el) {
      // uncheck global if any province toggled
      if (el.checked) document.getElementById('regionAll').checked = false;
      // update group checkbox state
      REGION_GROUPS.forEach(g => {
        if (g.provinces.indexOf(province) !== -1) {
          const allChecked = g.provinces.every(p => {
            const cb = Array.from(document.querySelectorAll('.provinceCheckbox')).find(x => x.dataset.province === p);
            return cb && cb.checked;
          });
          const groupCb = Array.from(document.querySelectorAll('.groupCheckbox')).find(x => x.dataset.group === g.name);
          if (groupCb) groupCb.checked = allChecked;
        }
      });
      syncHiddenRegions();
    }

    function syncHiddenRegions() {
      const all = document.getElementById('regionAll').checked;
      if (all) {
        document.getElementById('sRegions').value = 'Toàn quốc';
        updateRegionTriggerLabel();
        return;
      }
      const selected = Array.from(document.querySelectorAll('.provinceCheckbox')).filter(cb=>cb.checked).map(cb=>cb.dataset.province);
      document.getElementById('sRegions').value = selected.join(', ');
      updateRegionTriggerLabel();
    }

    function applyRegionsSelection(regions) {
      // regions: array like ['Toàn quốc'] or ['TP.HCM','Hà Nội']
      renderRegionPicker();
      if (!regions || !regions.length) return;
      const allCb = document.getElementById('regionAll');
      if (regions.length === 1 && regions[0] === 'Toàn quốc') {
        if (allCb) allCb.checked = true;
        Array.from(document.querySelectorAll('.provinceCheckbox')).forEach(c=>c.checked=false);
        Array.from(document.querySelectorAll('.groupCheckbox')).forEach(c=>c.checked=false);
        document.getElementById('sRegions').value = 'Toàn quốc';
        updateRegionTriggerLabel();
        return;
      }
      // otherwise check listed provinces
      Array.from(document.querySelectorAll('.provinceCheckbox')).forEach(cb => {
        cb.checked = regions.indexOf(cb.dataset.province) !== -1;
      });
      // update group checkboxes
      REGION_GROUPS.forEach(g => {
        const groupCb = Array.from(document.querySelectorAll('.groupCheckbox')).find(x => x.dataset.group === g.name);
        if (groupCb) groupCb.checked = g.provinces.every(p => regions.indexOf(p) !== -1);
      });
      document.getElementById('sRegions').value = regions.join(', ');
      updateRegionTriggerLabel();
    }

    function updateRegionTriggerLabel() {
      const label = document.getElementById('regionTriggerLabel');
      const all = document.getElementById('regionAll') && document.getElementById('regionAll').checked;
      if (all) { label.textContent = '🌐 Toàn quốc'; return; }
      const selected = Array.from(document.querySelectorAll('.provinceCheckbox')).filter(cb=>cb.checked).map(cb=>cb.dataset.province);
      if (!selected.length) { label.textContent = '-- Chọn khu vực --'; return; }
      if (selected.length <= 3) label.textContent = selected.join(', ');
      else label.textContent = selected.slice(0,3).join(', ') + '...';
    }

    function saveShipping() {
      const errEl = document.getElementById('modalError');
      const id = document.getElementById('editId').value;
      const name = document.getElementById('sName').value.trim();
      if (!name) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display = 'flex'; return; }
      const delivery = document.getElementById('sDeliveryTime').value.trim();
      if (!delivery) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display = 'flex'; return; }
      const regions = document.getElementById('sRegions').value.split(',').map(s=>s.trim()).filter(Boolean);
      if (!regions.length) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display = 'flex'; return; }
      if (!document.getElementById('sStatus').value) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display = 'flex'; return; }
      const data = {
        name,
        deliveryTime: delivery,
        status: document.getElementById('sStatus').value,
        regions: regions,
        description: document.getElementById('sDesc').value.trim()
      };
      showConfirm(id ? 'Cập nhật phương thức vận chuyển?' : 'Thêm phương thức vận chuyển mới?', () => {
        const result = id ? ShippingModule.update(id, data) : ShippingModule.create(data);
        if (result.error) { errEl.textContent = result.error; errEl.style.display = 'flex'; return; }
        closeModal();
        renderTable();
        showSuccess(id ? 'Cập nhật phương thức vận chuyển thành công!' : 'Thêm phương thức vận chuyển thành công!');
      });
    }

    function toggleStatus(id, currentStatus) {
      const action = currentStatus === 'active' ? 'suspend' : 'activate';
      const label  = action === 'suspend' ? 'Tạm ngừng' : 'Kích hoạt';
      showConfirm(label + ' phương thức vận chuyển này?', () => {
        action === 'suspend' ? ShippingModule.suspend(id) : ShippingModule.activate(id);
        closePanel();
        renderTable();
        showSuccess(label + ' phương thức vận chuyển thành công!');
      });
    }

    function deleteMethod(id) {
      showConfirm('Có muốn xóa phương thức vận chuyển này không?', () => {
        ShippingModule.delete(id);
        closePanel();
        renderTable();
        showSuccess('Xóa phương thức vận chuyển thành công!');
      });
    }

    renderTable();
  </script>
</body>
</html>
