<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết đơn hàng - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">Chi tiết đơn hàng</div>
        <div class="topbar-actions">
          <a href="/admin/orders.html" class="topbar-btn" style="background:var(--gray-100);color:var(--gray-700)">← Quay lại</a>
        </div>
      </div>
      <div class="admin-content" id="orderContent"><div class="spinner"></div></div>
    </main>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/product.js"></script>
  <script src="../assets/js/order.js"></script>
  <script src="../assets/js/inventory.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth(['admin','manager','accountant','warehouse','sales']);
    if (session) document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('orders', session);

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    const STATUS_SEQUENCE = ['cho_xac_nhan','da_xac_nhan','dang_giao','dang_thue','da_tra_do'];

    function renderOrderDetail() {
      const order = OrderModule.getRentalOrderById(orderId);
      if (!order) { document.getElementById('orderContent').innerHTML = '<div class="empty-state"><div class="empty-state-icon">😕</div><div class="empty-state-title">Không tìm thấy đơn hàng</div></div>'; return; }

      const currentIdx = STATUS_SEQUENCE.indexOf(order.status);

      // Check conflicts
      const conflicts = [];
      (order.items || []).forEach(item => {
        const c = InventoryModule.checkConflicts(item.productId, item.rentalStartDate, item.rentalEndDate);
        if (c.length > 1) conflicts.push({ productName: item.productName, count: c.length });
      });

      document.getElementById('orderContent').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 340px;gap:24px">
          <div>
            ${conflicts.length ? `<div class="alert alert-warning">⚠️ Xung đột lịch: ${conflicts.map(c => `${c.productName} (${c.count} đơn)`).join(', ')}</div>` : ''}

            <div class="admin-form-card">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <div>
                  <h2 style="font-size:20px;font-weight:700">${order.orderRef}</h2>
                  <div style="font-size:13px;color:var(--gray-400)">Tạo ngày ${formatDate(order.createdAt)}</div>
                </div>
                <span class="status-badge status-${order.status}" style="font-size:14px;padding:6px 16px">${STATUS_LABELS[order.status]}</span>
              </div>

              <!-- Status Actions -->
              ${order.status !== 'da_huy' && order.status !== 'da_tra_do' ? `
              <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:14px;background:var(--gray-50);border-radius:var(--radius-sm)">
                <label style="font-size:13px;font-weight:600;color:var(--gray-600);white-space:nowrap">Cập nhật trạng thái:</label>
                <select id="statusSelect" class="form-control" style="width:auto;min-width:180px;font-size:13px;padding:7px 12px">
                  ${STATUS_SEQUENCE.map(s => `<option value="${s}"${s === order.status ? ' selected' : ''}>${STATUS_LABELS[s]}</option>`).join('')}
                  <option value="da_huy"${order.status === 'da_huy' ? ' selected' : ''}>Đã hủy</option>
                </select>
                <button class="btn btn-primary btn-sm" onclick="saveStatus()" style="background:var(--admin-primary);white-space:nowrap">Lưu trạng thái</button>
              </div>` : ''}
            </div>

            <!-- Items -->
            <div class="admin-form-card">
              <h3>Sản phẩm thuê</h3>
              ${(order.items || []).length === 0 ? '<p style="color:var(--gray-400)">Chưa có sản phẩm</p>' :
                (order.items || []).map(i => {
                  const stock = InventoryModule.getStock(i.productId, i.size);
                  return `<div style="display:flex;gap:16px;padding:12px 0;border-bottom:1px solid var(--gray-100)">
                    <img src="${i.productImage || 'https://via.placeholder.com/60x80'}" style="width:60px;height:80px;object-fit:cover;border-radius:6px">
                    <div style="flex:1">
                      <div style="font-weight:600">${i.productName}</div>
                      <div style="font-size:13px;color:var(--gray-500)">Size: ${i.size} | Màu: ${i.color}</div>
                      <div style="font-size:13px;color:var(--gray-500)">${formatDate(i.rentalStartDate)} → ${formatDate(i.rentalEndDate)} (${i.rentalDays} ngày)</div>
                      <div style="font-size:13px;margin-top:4px">
                        Tồn kho: <span style="font-weight:600;color:${stock && stock.quantity > 0 ? 'var(--success)' : 'var(--error)'}">${stock ? stock.quantity : 'N/A'}</span>
                        ${stock?.conditionNotes ? ` | Tình trạng: ${stock.conditionNotes}` : ''}
                      </div>
                    </div>
                    <div style="font-weight:700;color:var(--admin-primary)">${formatCurrency(i.subtotal)}</div>
                  </div>`;
                }).join('')}
            </div>

            <!-- Condition Notes -->
            <div class="admin-form-card">
              <h3>Ghi nhận tình trạng trang phục</h3>
              <div class="form-group"><label>Ghi chú tình trạng</label><textarea id="conditionNotes" class="form-control" rows="3" placeholder="Mô tả tình trạng trang phục..."></textarea></div>
              <button class="btn btn-secondary btn-sm" onclick="saveCondition()">💾 Lưu ghi chú</button>
            </div>

            <!-- Status History -->
            <div class="admin-form-card">
              <h3>Lịch sử trạng thái</h3>
              ${(order.statusHistory || []).map(h => `
                <div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px">
                  <span class="status-badge status-${h.status}">${STATUS_LABELS[h.status]||h.status}</span>
                  <span style="color:var(--gray-500)">${new Date(h.timestamp).toLocaleString('vi-VN')}</span>
                </div>`).join('')}
            </div>
          </div>

          <!-- Sidebar -->
          <div>
            <div class="admin-form-card">
              <h3>Thông tin khách hàng</h3>
              <div style="font-size:14px;display:grid;gap:8px">
                <div>👤 <strong>${order.customerName}</strong></div>
                <div>📞 ${order.deliveryInfo?.phone || '-'}</div>
                <div>📍 ${order.deliveryInfo?.address || '-'}</div>
                ${order.deliveryInfo?.preferredDeliveryDate ? `<div>📅 Giao: ${formatDate(order.deliveryInfo.preferredDeliveryDate)}</div>` : ''}
              </div>
            </div>

            <div class="admin-form-card">
              <h3>Thanh toán</h3>
              <div style="font-size:14px;display:grid;gap:6px">
                <div style="display:flex;justify-content:space-between"><span>Tiền thuê:</span><span>${formatCurrency(order.subtotal)}</span></div>
                <div style="display:flex;justify-content:space-between"><span>Tiền cọc:</span><span style="color:var(--warning)">${formatCurrency(order.depositTotal)}</span></div>
                ${order.shippingCost ? `<div style="display:flex;justify-content:space-between"><span>Vận chuyển:</span><span>${formatCurrency(order.shippingCost)}</span></div>` : ''}
                ${order.discountAmount ? `<div style="display:flex;justify-content:space-between;color:var(--success)"><span>Giảm giá:</span><span>-${formatCurrency(order.discountAmount)}</span></div>` : ''}
                <hr style="border:none;border-top:1px solid var(--gray-200)">
                <div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px"><span>Tổng:</span><span style="color:var(--admin-primary)">${formatCurrency(order.totalAmount)}</span></div>
                <div>TT: <span class="status-badge status-${order.paymentStatus === 'paid' ? 'da_xac_nhan' : order.paymentStatus === 'refunded' ? 'da_huy' : 'cho_xac_nhan'}">${order.paymentStatus === 'paid' ? '✅ Đã TT' : order.paymentStatus === 'refunded' ? '↩️ Đã hoàn' : '⏳ Chờ TT'}</span></div>
                <div>Cọc: <span class="status-badge status-${order.depositStatus === 'refunded' ? 'da_tra_do' : 'cho_xac_nhan'}">${order.depositStatus === 'refunded' ? '✅ Đã hoàn' : '🔒 Đang giữ'}</span></div>
              </div>
              <div style="margin-top:14px;border-top:1px solid var(--gray-100);padding-top:14px;display:grid;gap:10px">
                <label style="font-size:13px;font-weight:600;color:var(--gray-600)">Cập nhật trạng thái thanh toán</label>
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                  <select id="paymentStatusSelect" class="form-control" style="width:auto;min-width:170px;font-size:13px;padding:8px 12px">
                    <option value="pending"${order.paymentStatus === 'pending' ? ' selected' : ''}>Chờ thanh toán</option>
                    <option value="paid"${order.paymentStatus === 'paid' ? ' selected' : ''}>Đã thanh toán</option>
                    <option value="refunded"${order.paymentStatus === 'refunded' ? ' selected' : ''}>Đã hoàn tiền</option>
                  </select>
                  <button class="btn btn-secondary btn-sm" onclick="savePaymentStatus()" style="white-space:nowrap">Lưu TT</button>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    }

    function saveStatus() {
      const sel = document.getElementById('statusSelect');
      if (!sel) return;
      const newStatus = sel.value;
      const order = OrderModule.getRentalOrderById(orderId);
      if (!order) return;
      if (newStatus === order.status) {
        showSuccess('Trạng thái không thay đổi.');
        return;
      }
      const label = STATUS_LABELS[newStatus] || newStatus;
      showConfirm(`Cập nhật trạng thái đơn hàng sang "${label}"?`, () => {
        if (newStatus === 'da_huy') {
          OrderModule.cancelRentalOrder(orderId, session.userId);
        } else {
          OrderModule.updateRentalStatus(orderId, newStatus, session.userId);
        }
        renderOrderDetail();
        showSuccess(`Cập nhật trạng thái thành công!`);
      });
    }

    function savePaymentStatus() {
      const sel = document.getElementById('paymentStatusSelect');
      if (!sel) return;
      const newPaymentStatus = sel.value;
      const order = OrderModule.getRentalOrderById(orderId);
      if (!order) return;
      if (newPaymentStatus === order.paymentStatus) {
        showSuccess('Trạng thái thanh toán không thay đổi.');
        return;
      }
      const label = newPaymentStatus === 'paid' ? 'Đã thanh toán' : newPaymentStatus === 'refunded' ? 'Đã hoàn tiền' : 'Chờ thanh toán';
      showConfirm(`Cập nhật trạng thái thanh toán sang "${label}"?`, () => {
        OrderModule.updateRentalPaymentStatus(orderId, newPaymentStatus, session.userId);
        renderOrderDetail();
        showSuccess(`Cập nhật trạng thái thanh toán thành công!`);
      });
    }

    function saveCondition() {
      const notes = document.getElementById('conditionNotes').value.trim();
      const order = OrderModule.getRentalOrderById(orderId);
      (order?.items || []).forEach(i => InventoryModule.recordCondition(i.productId, i.size, notes, ''));
      Toast.show('Đã lưu ghi chú tình trạng', 'success');
    }

    renderOrderDetail();
  </script>
</body>
</html>
