<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý sản phẩm - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    .detail-panel{position:fixed;top:0;right:-520px;width:520px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,0.15);z-index:200;transition:right 0.3s;display:flex;flex-direction:column}
    .detail-panel.open{right:0}
    .detail-panel-header{padding:20px 24px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
    .detail-panel-body{flex:1;overflow-y:auto;padding:24px}
    .detail-panel-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;gap:10px;justify-content:flex-end}
    .panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:199}
    .panel-overlay.show{display:block}
    .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:14px}
    .detail-row:last-child{border-bottom:none}
    .detail-label{color:var(--gray-500);font-weight:500}
    .detail-value{font-weight:600;color:var(--gray-800);text-align:right;max-width:65%}
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">👗 Quản lý sản phẩm</div>
        <div class="topbar-actions" id="topbarActions"></div>
      </div>
      <div class="admin-content">
        <div class="table-container">
          <div class="table-header">
            <div class="table-search"><input type="text" id="searchInput" placeholder="Tìm tên sản phẩm..." oninput="applyFilters()"></div>
            <select id="catFilter" class="form-control" style="width:160px;padding:8px 12px;font-size:13px" onchange="applyFilters()">
              <option value="">Tất cả danh mục</option>
            </select>
          </div>
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead><tr><th>Ảnh</th><th>Tên sản phẩm</th><th>Danh mục</th><th>Giá thuê/ngày</th><th>Tiền cọc</th><th>Size</th><th>Chi tiết</th></tr></thead>
              <tbody id="productsTable"></tbody>
            </table>
          </div>
          <div id="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Detail Panel -->
  <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-panel-header">
      <div style="font-weight:700;font-size:16px" id="panelTitle">Chi tiết sản phẩm</div>
      <button onclick="closePanel()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400)">✕</button>
    </div>
    <div class="detail-panel-body" id="panelBody"></div>
    <div class="detail-panel-footer" id="panelFooter"></div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="productModal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:600px">
      <div class="modal-header"><div class="modal-title" id="modalTitle">Thêm sản phẩm</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group"><label>Tên sản phẩm *</label><input type="text" id="pName" class="form-control"></div>
        <div class="form-group"><label>Danh mục *</label><select id="pCat" class="form-control"></select></div>
      </div>
      <div class="form-group"><label>Mô tả</label><textarea id="pDesc" class="form-control" rows="2"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Giá thuê/ngày (đ) *</label><input type="number" id="pPrice" class="form-control" min="0"></div>
        <div class="form-group"><label>Tiền cọc (đ)</label><input type="number" id="pDeposit" class="form-control" min="0"></div>
      </div>
      <div class="form-group"><label>Sizes (cách nhau bằng dấu phẩy)</label><input type="text" id="pSizes" class="form-control" placeholder="S, M, L, XL"></div>
      <div class="form-group"><label>Màu sắc (cách nhau bằng dấu phẩy)</label><input type="text" id="pColors" class="form-control" placeholder="Đỏ, Trắng, Đen"></div>
      <div class="form-group"><label>URL ảnh (mỗi dòng một URL)</label><textarea id="pImages" class="form-control" rows="2" placeholder="https://..."></textarea></div>
      <div id="modalError" class="alert alert-error" style="display:none"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="saveProduct()" style="background:var(--admin-primary)">Lưu</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/product.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth();
    if (!session) throw new Error('No session');
    document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('products', session);
    const _canEdit = canEdit('products', session.role);
    if (_canEdit) document.getElementById('topbarActions').innerHTML = '<button class="topbar-btn topbar-btn-primary" onclick="openModal()">+ Thêm sản phẩm</button>';

    let currentPage = 1, allProducts = [];
    const cats = ProductModule.getCategories();
    const catSel = document.getElementById('catFilter');
    const catModalSel = document.getElementById('pCat');
    cats.forEach(c => {
      [catSel, catModalSel].forEach(s => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.name; s.appendChild(o); });
    });

    function applyFilters() {
      allProducts = ProductModule.getAll({ name: document.getElementById('searchInput').value, categoryId: document.getElementById('catFilter').value });
      currentPage = 1; renderTable();
    }

    function renderTable() {
      const paged = paginate(allProducts, currentPage);
      const tbody = document.getElementById('productsTable');
      if (!paged.items.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">Không có sản phẩm</td></tr>'; }
      else tbody.innerHTML = paged.items.map(p => {
        const cat = cats.find(c => c.id === p.categoryId);
        return `<tr>
          <td><img src="${p.images[0]||'https://via.placeholder.com/50x65'}" style="width:50px;height:65px;object-fit:cover;border-radius:6px"></td>
          <td><div style="font-weight:600">${p.name}</div><div style="font-size:12px;color:var(--gray-400)">${p.colors?.join(', ')}</div></td>
          <td>${cat?.name||'—'}</td>
          <td style="font-weight:600;color:var(--admin-primary)">${formatCurrency(p.rentalPricePerDay)}</td>
          <td>${formatCurrency(p.depositAmount)}</td>
          <td style="font-size:13px">${p.sizes?.join(', ')}</td>
          <td><button class="action-btn action-btn-view" onclick="openDetail('${p.id}')">Xem chi tiết</button></td>
        </tr>`;
      }).join('');
      renderPagination('pagination', paged, 'goPage');
    }

    function goPage(p) { currentPage = p; renderTable(); }

    function openDetail(id) {
      const p = ProductModule.getById(id);
      if (!p) return;
      const cat = cats.find(c => c.id === p.categoryId);
      document.getElementById('panelTitle').textContent = p.name;
      document.getElementById('panelBody').innerHTML = `
        ${p.images[0] ? `<img src="${p.images[0]}" style="width:100%;height:200px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px">` : ''}
        <div class="detail-row"><span class="detail-label">Tên sản phẩm</span><span class="detail-value">${p.name}</span></div>
        <div class="detail-row"><span class="detail-label">Danh mục</span><span class="detail-value">${cat?.name||'—'}</span></div>
        <div class="detail-row"><span class="detail-label">Giá thuê/ngày</span><span class="detail-value" style="color:var(--admin-primary)">${formatCurrency(p.rentalPricePerDay)}</span></div>
        <div class="detail-row"><span class="detail-label">Tiền cọc</span><span class="detail-value" style="color:var(--warning)">${formatCurrency(p.depositAmount)}</span></div>
        <div class="detail-row"><span class="detail-label">Sizes</span><span class="detail-value">${p.sizes?.join(', ')||'—'}</span></div>
        <div class="detail-row"><span class="detail-label">Màu sắc</span><span class="detail-value">${p.colors?.join(', ')||'—'}</span></div>
        <div class="detail-row"><span class="detail-label">Mô tả</span><span class="detail-value" style="font-weight:400;color:var(--gray-600)">${p.description||'—'}</span></div>
        <div class="detail-row"><span class="detail-label">Ngày tạo</span><span class="detail-value">${formatDate(p.createdAt)}</span></div>`;
      const footer = document.getElementById('panelFooter');
      if (_canEdit) {
        footer.innerHTML = `
          <button class="btn btn-danger btn-sm" onclick="archiveProduct('${p.id}')">Ẩn sản phẩm</button>
          <button class="btn btn-primary btn-sm" onclick="openEdit('${p.id}')" style="background:var(--admin-primary)">Chỉnh sửa</button>`;
      } else {
        footer.innerHTML = '<span style="font-size:13px;color:var(--gray-400)">Bạn chỉ có quyền xem</span>';
      }
      document.getElementById('detailPanel').classList.add('open');
      document.getElementById('panelOverlay').classList.add('show');
    }

    function closePanel() { document.getElementById('detailPanel').classList.remove('open'); document.getElementById('panelOverlay').classList.remove('show'); }

    function openModal() {
      document.getElementById('editId').value = '';
      document.getElementById('modalTitle').textContent = 'Thêm sản phẩm';
      document.getElementById('modalError').style.display = 'none';
      ['pName','pDesc','pPrice','pDeposit','pSizes','pColors','pImages'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('pCat').value = '';
      document.getElementById('productModal').style.display = 'flex';
    }

    function openEdit(id) {
      closePanel();
      const p = ProductModule.getById(id);
      if (!p) return;
      document.getElementById('editId').value = id;
      document.getElementById('pName').value = p.name;
      document.getElementById('pCat').value = p.categoryId;
      document.getElementById('pDesc').value = p.description;
      document.getElementById('pPrice').value = p.rentalPricePerDay;
      document.getElementById('pDeposit').value = p.depositAmount;
      document.getElementById('pSizes').value = p.sizes?.join(', ');
      document.getElementById('pColors').value = p.colors?.join(', ');
      document.getElementById('pImages').value = p.images?.join('\n');
      document.getElementById('modalTitle').textContent = 'Sửa sản phẩm';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('productModal').style.display = 'none'; }

    function saveProduct() {
      const errEl = document.getElementById('modalError');
      const id = document.getElementById('editId').value;
      const data = {
        name: document.getElementById('pName').value.trim(),
        categoryId: document.getElementById('pCat').value,
        description: document.getElementById('pDesc').value.trim(),
        rentalPricePerDay: document.getElementById('pPrice').value,
        depositAmount: document.getElementById('pDeposit').value,
        sizes: document.getElementById('pSizes').value.split(',').map(s=>s.trim()).filter(Boolean),
        colors: document.getElementById('pColors').value.split(',').map(s=>s.trim()).filter(Boolean),
        images: document.getElementById('pImages').value.split('\n').map(s=>s.trim()).filter(Boolean),
      };
      if (!data.name || !data.categoryId || !data.rentalPricePerDay) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin bắt buộc'; errEl.style.display = 'flex'; return; }
      showConfirm(id ? 'Cập nhật sản phẩm này?' : 'Thêm sản phẩm mới?', () => {
        const result = id ? ProductModule.update(id, data) : ProductModule.create(data);
        if (result.error) { errEl.textContent = result.error; errEl.style.display = 'flex'; return; }
        Toast.show(id ? 'Đã cập nhật sản phẩm' : 'Đã thêm sản phẩm', 'success');
        closeModal(); applyFilters();
      });
    }

    function archiveProduct(id) {
      showConfirm('Ẩn sản phẩm này khỏi danh sách?', () => {
        ProductModule.archive(id);
        Toast.show('Đã ẩn sản phẩm', 'success');
        closePanel(); applyFilters();
      });
    }

    applyFilters();
  </script>
</body>
</html>
