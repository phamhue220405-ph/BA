<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi phí vận chuyển - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">💰 Chi phí vận chuyển</div>
        <div class="topbar-actions">
          <button class="topbar-btn topbar-btn-primary" onclick="openModal()">+ Thiết lập chi phí</button>
        </div>
      </div>
      <div class="admin-content">
        <!-- Sub-nav -->
        <div style="display:flex;gap:8px;margin-bottom:20px">
          <a href="/admin/shipping.html" class="btn btn-secondary btn-sm">🚚 Phương thức</a>
          <a href="/admin/shipping-costs.html" class="btn btn-primary btn-sm" style="background:var(--admin-primary)">💰 Chi phí</a>
          <a href="/admin/shipping-orders.html" class="btn btn-secondary btn-sm">📬 Đơn vận chuyển</a>
        </div>

        <!-- Filter -->
        <div class="admin-form-card" style="margin-bottom:20px">
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
            <div class="form-group" style="flex:1;min-width:180px;margin:0">
              <label style="font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase">Phương thức vận chuyển</label>
              <select id="methodFilter" class="form-control" style="margin-top:6px" onchange="renderTable()">
                <option value="">Tất cả phương thức</option>
              </select>
            </div>
            <div class="form-group" style="flex:1;min-width:180px;margin:0">
              <label style="font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase">Khu vực</label>
              <input type="text" id="regionFilter" class="form-control" style="margin-top:6px" placeholder="Tìm khu vực..." oninput="renderTable()">
            </div>
          </div>
        </div>

        <div class="table-container">
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Phương thức vận chuyển</th>
                  <th>Khu vực</th>
                  <th>Chi phí</th>
                  <th>Thời gian giao</th>
                  <th>Cập nhật lần cuối</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="costsTable"></tbody>
            </table>
          </div>
          <div id="pagination" style="margin-top:20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="costModal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:500px">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Thiết lập chi phí vận chuyển</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <input type="hidden" id="editMethodId">
      <input type="hidden" id="editRegion">

      <div class="form-group">
        <label>Phương thức vận chuyển *</label>
        <select id="costMethodId" class="form-control" onchange="loadRegions()">
          <option value="">-- Chọn phương thức --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Khu vực *</label>
        <select id="costRegion" class="form-control">
          <option value="">-- Chọn khu vực --</option>
        </select>
        <div style="font-size:12px;color:var(--gray-400);margin-top:4px">Khu vực được lấy từ phương thức vận chuyển đã chọn</div>
      </div>
      <div class="form-group">
        <label>Chi phí (đ) *</label>
        <input type="number" id="costAmount" class="form-control" min="0" placeholder="30000">
      </div>
      <div class="form-group">
        <label>Thời gian giao (ngày) *</label>
        <input type="number" id="costDays" class="form-control" min="1" value="1" placeholder="VD: 2">
        <div style="font-size:12px;color:var(--gray-400);margin-top:4px">Số ngày giao hàng cụ thể cho khu vực này</div>
      </div>
      <div id="modalError" class="alert alert-error" style="display:none"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="saveCost()" style="background:var(--admin-primary)">Lưu</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/shipping.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth(['admin','manager']);
    if (session) document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('shipping-costs', session);

    let currentCostPage = 1;
    const costsPerPage = 20;

    // Populate method filter (extract to function so we can refresh when storage changes)
    const methodFilterSel = document.getElementById('methodFilter');
    const costMethodSel = document.getElementById('costMethodId');
    function populateMethodOptions() {
      const methods = ShippingModule.getAll();
      // clear existing options except the first default
      methodFilterSel.innerHTML = '<option value="">Tất cả phương thức</option>';
      costMethodSel.innerHTML = '<option value="">-- Chọn phương thức --</option>';
      methods.forEach(m => {
        [methodFilterSel, costMethodSel].forEach(sel => {
          const o = document.createElement('option');
          o.value = m.id;
          o.textContent = m.name;
          sel.appendChild(o);
        });
      });
    }
    populateMethodOptions();

    function loadRegions() {
      const methodId = document.getElementById('costMethodId').value;
      const regionSel = document.getElementById('costRegion');
      regionSel.innerHTML = '';
      if (!methodId) {
        regionSel.innerHTML = '<option value="">-- Chọn phương thức trước --</option>';
        regionSel.disabled = true;
        return;
      }
      const method = ShippingModule.getById(methodId);
      const regions = method?.regions || [];
      if (!regions.length) {
        regionSel.innerHTML = '<option value="">-- Phương thức chưa có khu vực --</option>';
        regionSel.disabled = true;
        return;
      }
      regionSel.innerHTML = '<option value="">-- Chọn khu vực --</option>';
      regions.forEach(r => {
        const o = document.createElement('option');
        o.value = r;
        o.textContent = r;
        regionSel.appendChild(o);
      });
      regionSel.disabled = false;
    }

    function renderTable() {
      const methodFilter = document.getElementById('methodFilter').value;
      const regionFilter = document.getElementById('regionFilter').value.toLowerCase();

        // Build flat list — chỉ lấy rows đã có chi phí
        const rows = [];
        const methods = ShippingModule.getAll();
        methods.forEach(m => {
          if (methodFilter && m.id !== methodFilter) return;
          (m.costs || []).forEach(c => {
            if (regionFilter && !c.region.toLowerCase().includes(regionFilter)) return;
            rows.push({ method: m, region: c.region, cost: c.cost, estimatedDays: c.estimatedDays ?? null });
          });
        });

      const tbody = document.getElementById('costsTable');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--gray-400)">Chưa có dữ liệu chi phí vận chuyển</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(rows.length / costsPerPage);
      if (currentCostPage > totalPages) currentCostPage = totalPages || 1;
      const startIdx = (currentCostPage - 1) * costsPerPage;
      const pagedRows = rows.slice(startIdx, startIdx + costsPerPage);

      tbody.innerHTML = pagedRows.map(r => `
        <tr>
          <td style="font-weight:600">${r.method.name}</td>
          <td><span class="tag">${r.region}</span></td>
          <td><span style="font-weight:700;color:var(--admin-primary);font-size:15px">${formatCurrency(r.cost)}</span></td>
          <td>${r.estimatedDays != null ? r.estimatedDays + ' ngày' : '<span style="color:var(--gray-400)">—</span>'}</td>
          <td style="font-size:12px;color:var(--gray-400)">${formatDate(r.method.updatedAt || r.method.createdAt)}</td>
          <td class="table-actions-cell">
            <button class="action-btn action-btn-edit" onclick="openEdit('${r.method.id}','${r.region}',${r.cost},${r.estimatedDays ?? ''})">Sửa</button>
            <button class="action-btn action-btn-delete" onclick="deleteCost('${r.method.id}','${r.region}')">Xóa</button>
          </td>
        </tr>`).join('');
      renderCostsPagination(totalPages);
    }

    function renderCostsPagination(totalPages) {
      const paginationContainer = document.getElementById('pagination');
      let html = '';
      if (currentCostPage > 1) html += `<button class="btn btn-sm btn-secondary" onclick="goToCostPage(${currentCostPage - 1})">← Trước</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === currentCostPage) html += `<button class="btn btn-sm btn-primary" style="background:var(--admin-primary)">${i}</button>`;
        else html += `<button class="btn btn-sm btn-secondary" onclick="goToCostPage(${i})">${i}</button>`;
      }
      if (currentCostPage < totalPages) html += `<button class="btn btn-sm btn-secondary" onclick="goToCostPage(${currentCostPage + 1})">Tiếp →</button>`;
      paginationContainer.innerHTML = html;
    }

    function goToCostPage(page) {
      currentCostPage = page;
      renderTable();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openModal() {
      document.getElementById('editMethodId').value = '';
      document.getElementById('editRegion').value = '';
      document.getElementById('costMethodId').value = '';
      document.getElementById('costRegion').innerHTML = '';
      loadRegions();
      document.getElementById('costAmount').value = '';
      document.getElementById('costDays').value = '1';
      document.getElementById('modalTitle').textContent = 'Thiết lập chi phí vận chuyển';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('costModal').style.display = 'flex';
    }

    function openEdit(methodId, region, cost, days) {
      document.getElementById('editMethodId').value = methodId;
      document.getElementById('editRegion').value = region;
      document.getElementById('costMethodId').value = methodId;
      loadRegions();
      setTimeout(() => { document.getElementById('costRegion').value = region; }, 50);
      document.getElementById('costAmount').value = cost;
      document.getElementById('costDays').value = days || 1;
      document.getElementById('modalTitle').textContent = 'Cập nhật chi phí vận chuyển';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('costModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('costModal').style.display = 'none'; }

    function saveCost() {
      const errEl = document.getElementById('modalError');
      const methodId = document.getElementById('costMethodId').value;
      const region = document.getElementById('costRegion').value;
      const amount = parseInt(document.getElementById('costAmount').value);
      const days = parseInt(document.getElementById('costDays').value);
      const editMethodId = document.getElementById('editMethodId').value;
      const editRegion = document.getElementById('editRegion').value;

      if (!methodId || !region) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display = 'flex'; return; }
      if (isNaN(amount) || amount < 0) { errEl.textContent = 'Chi phí không hợp lệ'; errEl.style.display = 'flex'; return; }
      if (isNaN(days) || days < 1) { errEl.textContent = 'Thời gian giao không hợp lệ'; errEl.style.display = 'flex'; return; }

      // Check for duplicate BEFORE showing confirm dialog
      const method = ShippingModule.getById(methodId);
      const costs = [...(method.costs || [])];
      const exists = costs.some(c => c.region === region);
      const isEdit = !!editMethodId;
      // If creating new and same region exists -> duplicate
      if (!isEdit && exists) { errEl.textContent = 'Chi phí cho khu vực này đã tồn tại'; errEl.style.display = 'flex'; return; }
      // If editing
      if (isEdit) {
        // If method unchanged
        if (editMethodId === methodId) {
          // If changed region to another existing region -> duplicate
          if (region !== editRegion && exists) { errEl.textContent = 'Chi phí cho khu vực này đã tồn tại'; errEl.style.display = 'flex'; return; }
        } else {
          // Method changed while editing: ensure target method doesn't already have the region
          if (exists) { errEl.textContent = 'Chi phí cho khu vực này đã tồn tại'; errEl.style.display = 'flex'; return; }
        }
      }

      showConfirm('Có muốn cập nhật chi phí vận chuyển không?', () => {
        const method = ShippingModule.getById(methodId);
        const costs = [...(method.costs || [])];
        const isEdit = !!editMethodId;
        if (isEdit) {
          // If method unchanged, replace the original entry
          if (editMethodId === methodId) {
            const idxOriginal = costs.findIndex(c => c.region === editRegion);
            if (idxOriginal >= 0) costs.splice(idxOriginal, 1);
            costs.push({ region, cost: amount, estimatedDays: days });
          } else {
            // Method changed while editing
            costs.push({ region, cost: amount, estimatedDays: days });
          }
        } else {
          // Creating: push new
          costs.push({ region, cost: amount, estimatedDays: days });
        }

        ShippingModule.update(methodId, { costs });
        closeModal();
        populateMethodOptions();
        renderTable();
        showSuccess('Cập nhật chi phí vận chuyển thành công!');
      });
    }

    function deleteCost(methodId, region) {
      showConfirm(`Xóa chi phí vận chuyển cho khu vực "${region}"?`, () => {
        const method = ShippingModule.getById(methodId);
        const costs = (method.costs || []).filter(c => c.region !== region);
        ShippingModule.update(methodId, { costs });
        renderTable();
        showSuccess('Đã xóa chi phí vận chuyển!');
      });
    }

    renderTable();

    // Refresh view when other tab updates shipping data
    window.addEventListener('storage', (e) => {
      if (e.key === 'crb_shipping_methods') {
        populateMethodOptions();
        renderTable();
      }
    });
  </script>
</body>
</html>
