<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Quản trị LuxRent</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <img src="/assets/images/logo.png" alt="LuxRent" class="site-logo site-logo-admin">
        <div class="admin-login-subtitle">Quản trị hệ thống</div>
      </div>
      <div id="loginError" class="alert alert-error" style="display:none"></div>
      <div class="form-group"><label>Email hoặc số điện thoại</label><input type="text" id="loginId" class="form-control" placeholder="admin@store.com"></div>
      <div class="form-group"><label>Mật khẩu</label><input type="password" id="loginPwd" class="form-control" placeholder="Mật khẩu"></div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()" style="background:var(--admin-primary)">Đăng nhập</button>
      <div style="margin-top:16px;background:var(--gray-50);border-radius:var(--radius-sm);padding:12px;font-size:12px;color:var(--gray-600)">
        <strong>Tài khoản demo:</strong><br>
        Admin: admin@store.com / Admin@123<br>
        Manager: manager@store.com / Manager@123<br>
        Sales: sales@store.com / Sales@123<br>
        Kho: warehouse@store.com / Warehouse@123<br>
        Marketing: marketing@store.com / Marketing@123
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = StorageService.getSession();
    if (session && session.role !== 'customer') window.location.href = '/admin/index.html';

    function doLogin() {
      const id = document.getElementById('loginId').value.trim();
      const pwd = document.getElementById('loginPwd').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      if (!id || !pwd) { errEl.textContent = 'Vui lòng nhập đầy đủ thông tin'; errEl.style.display = 'flex'; return; }
      const result = AuthModule.login(id, pwd);
      if (result.error) { errEl.textContent = result.error; errEl.style.display = 'flex'; return; }
      if (result.session.role === 'customer') { errEl.textContent = 'Tài khoản không có quyền truy cập admin'; errEl.style.display = 'flex'; StorageService.clearSession(); return; }
      window.location.href = '/admin/index.html';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
