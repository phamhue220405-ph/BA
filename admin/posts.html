<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài viết - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar" style="height:auto;min-height:64px;padding:16px 28px;">
        <div class="topbar-title">📰 Quản lý bài viết</div>
        <div class="topbar-actions" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between;width:100%">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;min-width:280px;">
            <div class="table-search" style="flex:1;min-width:220px;max-width:320px;">
              <input type="text" id="postsSearchInput" class="form-control" placeholder="Tìm kiếm bài viết..." oninput="applyPostFilters()">
            </div>
            <input type="date" id="postStartDateInput" class="form-control" style="max-width:160px;min-width:140px;" onchange="applyPostFilters()" title="Từ ngày đăng">
            <input type="date" id="postEndDateInput" class="form-control" style="max-width:160px;min-width:140px;" onchange="applyPostFilters()" title="Đến ngày đăng">
          </div>
          <button class="topbar-btn topbar-btn-primary" onclick="openModal()">+ Tạo bài viết</button>
        </div>
      </div>
      <div class="admin-content">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px" id="postsGrid">
          <div class="spinner"></div>
        </div>
        <div id="pagination" style="margin-top:24px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap"></div>
      </div>
    </main>
  </div>

  <div id="postModal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:650px">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Tạo bài viết</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Tiêu đề *</label>
        <input type="text" id="pTitle" class="form-control" maxlength="120" placeholder="Tối đa 120 ký tự">
      </div>
      <div class="form-group">
        <label>Nội dung *</label>
        <div class="editor-toolbar" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:center">
          <button type="button" class="btn btn-secondary" onclick="formatText('bold')"><b>B</b></button>
          <button type="button" class="btn btn-secondary" onclick="formatText('italic')"><i>I</i></button>
          <button type="button" class="btn btn-secondary" onclick="formatText('underline')"><u>U</u></button>
          <select id="pFont" class="form-control" style="width:auto;min-width:150px" onchange="formatText('fontName', this.value)">
            <option value="">Phông chữ</option>
            <option value="Arial">Arial</option>
            <option value="'Times New Roman'">Times New Roman</option>
            <option value="Georgia">Georgia</option>
            <option value="Tahoma">Tahoma</option>
            <option value="Courier New">Courier New</option>
          </select>
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('pInsertImageFile').click()">Chèn ảnh</button>
          <input type="file" id="pInsertImageFile" style="display:none" accept=".jpg,.jpeg,.png" multiple onchange="insertImagesFromFile(event)">
        </div>
        <div id="pContentEditor" class="rich-editor form-control" contenteditable="true" style="min-height:220px;padding:14px;border:1px solid #d1d5db;border-radius:10px;background:#fff;overflow:auto;"></div>
      </div>
      <div class="form-group">
        <label>Danh mục *</label>
        <select id="pCategory" class="form-control"><option value="">-- Chọn danh mục --</option></select>
      </div>
      <div class="form-group">
        <label>Trạng thái *</label>
        <select id="pStatus" class="form-control"><option value="visible">Hiện</option><option value="hidden">Ẩn</option></select>
      </div>
      <div class="form-group">
        <label>Thẻ tags</label>
        <input type="text" id="pTags" class="form-control" placeholder="marketing, khuyến mãi, sự kiện">
      </div>
      <div id="modalError" class="alert alert-error" style="display:none"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="savePost()" style="background:var(--admin-primary)">Lưu</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/promotion.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth();
    if (session) document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('posts', session);

    const POST_CATEGORIES = [
      { id: 'news',      name: 'Tin tức' },
      { id: 'promotion', name: 'Khuyến mại' },
      { id: 'event',     name: 'Sự kiện' }
    ];

    let currentPostPage = 1;
    const postsPerPage = 12;
    let postSearchQuery = '';
    let postStartDateFilter = '';
    let postEndDateFilter = '';

    // ── Render grid ───────────────────────────────────────────────────

    function renderPosts() {
      const allPosts = PromotionModule.getAllPosts({ search: postSearchQuery, startDate: postStartDateFilter, endDate: postEndDateFilter });
      const grid = document.getElementById('postsGrid');

      if (!allPosts.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📰</div><div class="empty-state-title">Chưa có bài viết</div></div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(allPosts.length / postsPerPage);
      if (currentPostPage > totalPages) currentPostPage = totalPages;
      const startIdx = (currentPostPage - 1) * postsPerPage;
      const posts = allPosts.slice(startIdx, startIdx + postsPerPage);

      grid.innerHTML = posts.map(p => `
        <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-200);overflow:hidden;box-shadow:var(--shadow-sm)">
          ${p.images && p.images[0]
            ? `<img src="${p.images[0]}" style="width:100%;height:160px;object-fit:cover">`
            : '<div style="height:80px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:32px">📰</div>'}
          <div style="padding:16px">
            <div style="font-weight:700;font-size:15px;margin-bottom:6px">${p.title}</div>
            <div style="font-size:12px;color:var(--gray-400);margin-bottom:8px">${formatDate(p.createdAt)} · ${creatorName(p.createdBy)}</div>
            <div style="font-size:13px;color:var(--gray-500);margin-bottom:12px">${p.content.replace(/<[^>]+>/g,'').slice(0,100)}...</div>
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
              <span class="status-badge status-${p.isPublished ? 'da_xac_nhan' : 'da_huy'}">${p.isPublished ? 'Hiện' : 'Ẩn'}</span>
              <span style="font-size:12px;color:var(--gray-500)">${categoryName(p.categoryId)}</span>
            </div>
            <div style="margin:10px 0 0;display:flex;flex-wrap:wrap;gap:6px">
              ${(p.tags || []).map(tag => `<span style="background:var(--gray-100);color:var(--gray-600);padding:4px 8px;border-radius:999px;font-size:11px">${tag}</span>`).join('')}
            </div>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
              <a href="/admin/post-detail.html?id=${p.id}" class="action-btn action-btn-view">Xem chi tiết</a>
            </div>
          </div>
        </div>`).join('');

      renderPostsPagination(totalPages);
    }

    function renderPostsPagination(totalPages) {
      const container = document.getElementById('pagination');
      let html = '';
      if (currentPostPage > 1) html += `<button class="btn btn-sm btn-secondary" onclick="goToPostPage(${currentPostPage - 1})">← Trước</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += i === currentPostPage
          ? `<button class="btn btn-sm btn-primary" style="background:var(--admin-primary)">${i}</button>`
          : `<button class="btn btn-sm btn-secondary" onclick="goToPostPage(${i})">${i}</button>`;
      }
      if (currentPostPage < totalPages) html += `<button class="btn btn-sm btn-secondary" onclick="goToPostPage(${currentPostPage + 1})">Tiếp →</button>`;
      container.innerHTML = html;
    }

    function goToPostPage(page) {
      currentPostPage = page;
      renderPosts();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function applyPostFilters() {
      postSearchQuery = document.getElementById('postsSearchInput').value.trim();
      postStartDateFilter = document.getElementById('postStartDateInput').value;
      postEndDateFilter = document.getElementById('postEndDateInput').value;
      currentPostPage = 1;
      renderPosts();
    }

    // ── Helpers ───────────────────────────────────────────────────────

    function categoryName(categoryId) {
      const cat = POST_CATEGORIES.find(c => c.id === categoryId);
      return cat ? cat.name : 'Chưa phân loại';
    }

    function creatorName(userId) {
      const user = StorageService.getById('crb_users', userId);
      if (user) return user.fullName || user.email || 'Người dùng';
      const s = StorageService.getSession();
      return s && s.userId === userId ? s.fullName || 'Người tạo' : 'Không xác định';
    }

    function renderCategoryOptions() {
      const select = document.getElementById('pCategory');
      if (!select) return;
      select.innerHTML = '<option value="">-- Chọn danh mục --</option>'
        + POST_CATEGORIES.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function parseTags(value) {
      return value.split(',').map(t => t.trim()).filter(Boolean);
    }

    function isValidImageUrl(url) {
      return /\.(jpe?g|png)$/i.test(url);
    }

    function readImageFiles(files) {
      const promises = Array.from(files).map(file => new Promise((resolve, reject) => {
        if (!/^image\/(jpeg|png)$/i.test(file.type)) {
          reject(new Error('Chỉ chấp nhận ảnh JPG/JPEG hoặc PNG.'));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Không thể đọc ảnh tải lên.'));
        reader.readAsDataURL(file);
      }));
      return Promise.all(promises);
    }

    function getContentImages(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      return Array.from(div.querySelectorAll('img')).map(img => img.src);
    }

    function validatePostData(data) {
      // Kiểm tra các trường bắt buộc
      if (!data.title || !data.title.trim()) return 'Vui lòng nhập đầy đủ thông tin';
      if (!data.content || !data.content.replace(/<[^>]+>/g, '').trim()) return 'Vui lòng nhập đầy đủ thông tin';
      if (!data.categoryId) return 'Vui lòng nhập đầy đủ thông tin';
      
      // Kiểm tra độ dài tiêu đề
      if (data.title.length > 120) return 'Tiêu đề không được vượt quá 120 ký tự';
      
      // Kiểm tra độ dài nội dung
      const plainContent = data.content.replace(/<[^>]+>/g, '').trim();
      if (plainContent.length < 150) return 'Nội dung phải tối thiểu 150 ký tự';
      
      // Kiểm tra URL ảnh
      const invalidUrl = (data.images || []).find(src => src && src.startsWith('http') && !isValidImageUrl(src));
      if (invalidUrl) return 'URL ảnh phải có định dạng jpg, jpeg hoặc png';
      
      return null;
    }

    // ── Rich editor ───────────────────────────────────────────────────

    function formatText(command, value) {
      document.getElementById('pContentEditor').focus();
      document.execCommand(command, false, value || null);
    }

    function insertImagesFromFile(event) {
      const files = event.target.files;
      if (!files.length) return;
      readImageFiles(files).then(images => {
        images.forEach(src => {
          document.getElementById('pContentEditor').focus();
          document.execCommand('insertImage', false, src);
        });
        event.target.value = '';
      }).catch(error => {
        const errEl = document.getElementById('modalError');
        errEl.textContent = error.message;
        errEl.style.display = 'flex';
      });
    }

    // ── Modal ─────────────────────────────────────────────────────────

    function openModal() {
      document.getElementById('editId').value = '';
      document.getElementById('pTitle').value = '';
      document.getElementById('pContentEditor').innerHTML = '';
      document.getElementById('pCategory').value = '';
      document.getElementById('pStatus').value = 'visible';
      document.getElementById('pTags').value = '';
      document.getElementById('pFont').value = '';
      document.getElementById('pInsertImageFile').value = '';
      document.getElementById('modalTitle').textContent = 'Tạo bài viết';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('postModal').style.display = 'flex';
    }

    function openEdit(id) {
      const p = StorageService.getById('crb_posts', id);
      if (!p) return;
      document.getElementById('editId').value = id;
      document.getElementById('pTitle').value = p.title;
      document.getElementById('pContentEditor').innerHTML = p.content || '';
      document.getElementById('pCategory').value = p.categoryId || '';
      document.getElementById('pStatus').value = p.isPublished ? 'visible' : 'hidden';
      document.getElementById('pTags').value = (p.tags || []).join(', ');
      document.getElementById('pFont').value = '';
      document.getElementById('pInsertImageFile').value = '';
      document.getElementById('modalTitle').textContent = 'Sửa bài viết';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('postModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('postModal').style.display = 'none'; }

    // ── Save / Delete ─────────────────────────────────────────────────

    async function savePost() {
      const errEl = document.getElementById('modalError');
      const id = document.getElementById('editId').value;
      const title = document.getElementById('pTitle').value.trim();
      const content = document.getElementById('pContentEditor').innerHTML.trim();
      const categoryId = document.getElementById('pCategory').value;
      const isPublished = document.getElementById('pStatus').value === 'visible';
      const tags = parseTags(document.getElementById('pTags').value);
      const images = getContentImages(content);
      const data = { title, content, categoryId, tags, images, isPublished };

      const validationError = validatePostData(data);
      if (validationError) {
        errEl.textContent = validationError;
        errEl.style.display = 'flex';
        return;
      }

      showConfirm(id ? 'Cập nhật bài viết này?' : 'Tạo bài viết mới?', () => {
        const result = id ? PromotionModule.updatePost(id, data) : PromotionModule.createPost(data);
        if (result.error) {
          errEl.textContent = result.error;
          errEl.style.display = 'flex';
          return;
        }
        Toast.show(id ? 'Đã cập nhật bài viết' : 'Đã đăng bài viết', 'success');
        closeModal();
        currentPostPage = 1;
        renderPosts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    function deletePost(id) {
      showConfirm('Xóa bài viết này?', () => {
        PromotionModule.deletePost(id);
        Toast.show('Đã xóa bài viết', 'success');
        renderPosts();
      });
    }

    function showUpdatedPostToast() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('updated') === '1') {
        Toast.show('Đã cập nhật bài viết', 'success');
        params.delete('updated');
        const newSearch = params.toString();
        window.history.replaceState({}, '', window.location.pathname + (newSearch ? `?${newSearch}` : ''));
      }
    }

    // ── Init ──────────────────────────────────────────────────────────
    renderCategoryOptions();
    renderPosts();
    showUpdatedPostToast();
  </script>
</body>
</html>
