<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tin t?c & Khuy?n măi - LuxRent</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/customer.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/index.html" class="navbar-brand"><img src="/assets/images/logo.png" alt="LuxRent" class="site-logo"></a>
      <div class="navbar-nav">
        <a href="/index.html" class="nav-link">Trang ch?</a>
        <a href="/customer/products.html" class="nav-link">S?n ph?m</a>
        <a href="/customer/fitting-booking.html" class="nav-link">Đ?t l?ch th?</a>
        <a href="/customer/news.html" class="nav-link active">Tin t?c</a>
      </div>
      <div class="navbar-actions">
        <a href="/customer/cart.html" class="cart-btn">?? <span class="cart-badge" style="display:none">0</span></a>
        <div class="user-menu" id="userMenu">
          <button class="user-btn" onclick="toggleUserMenu()"><span id="userMenuLabel">?? Đang nh?p</span> ?</button>
          <div class="user-dropdown" id="userDropdown" style="display:none">
            <div id="guestLinks"><a href="/customer/login.html">?? Đang nh?p</a></div>
            <div id="authLinks" style="display:none"><a href="/customer/profile.html">?? H? so</a><a href="/customer/orders.html">?? Đon hŕng</a><hr><a href="#" onclick="doLogout()">?? Đang xu?t</a></div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="page-header"><div class="container"><h1>Tin t?c & Khuy?n măi</h1><p>C?p nh?t nh?ng uu dăi m?i nh?t t? LuxRent</p></div></div>

  <section class="section">
    <div class="container">
      <!-- Promo Codes Banner -->
      <div style="background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:var(--radius-lg);padding:28px;color:var(--white);margin-bottom:48px">
        <h2 style="font-family:var(--font-display);margin-bottom:8px">?? Mă gi?m giá dang ho?t d?ng</h2>
        <div id="promoCodes" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px"></div>
      </div>

      <div class="news-grid" id="newsGrid"><div class="spinner"></div></div>
    </div>
  </section>

  <!-- Post Detail Modal -->
  <div id="postModal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:700px">
      <div class="modal-header"><div class="modal-title" id="modalTitle"></div><button class="modal-close" onclick="closeModal()">?</button></div>
      <img id="modalImg" src="" style="width:100%;border-radius:var(--radius);margin-bottom:16px;display:none">
      <div id="modalContent" style="font-size:15px;line-height:1.8;color:var(--gray-700)"></div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Đóng</button></div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/promotion.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = StorageService.getSession();
    if (session) { document.getElementById('userMenuLabel').textContent = '?? ' + session.fullName; document.getElementById('guestLinks').style.display = 'none'; document.getElementById('authLinks').style.display = 'block'; CartModule.updateCartBadge(session.userId); }
    function toggleUserMenu() { const dd = document.getElementById('userDropdown'); dd.style.display = dd.style.display === 'none' ? 'block' : 'none'; }
    document.addEventListener('click', e => { if (!document.getElementById('userMenu').contains(e.target)) document.getElementById('userDropdown').style.display = 'none'; });
    function doLogout() { AuthModule.logout(); }

    // Promo codes
    const activeCodes = PromotionModule.getAllCodes({ status: 'active' });
    const promoContainer = document.getElementById('promoCodes');
    if (activeCodes.length) {
      promoContainer.innerHTML = activeCodes.map(p => `
        <div style="background:rgba(255,255,255,0.2);border-radius:var(--radius-sm);padding:12px 20px;backdrop-filter:blur(10px)">
          <div style="font-size:20px;font-weight:700;letter-spacing:2px">${p.code}</div>
          <div style="font-size:12px;opacity:0.85">${p.discountType === 'percentage' ? `Gi?m ${p.discountValue}%` : `Gi?m ${formatCurrency(p.discountValue)}`} | Đon t? ${formatCurrency(p.minOrderValue)}</div>
          <div style="font-size:11px;opacity:0.7">HSD: ${formatDate(p.endDate)}</div>
        </div>`).join('');
    } else {
      promoContainer.innerHTML = '<p style="opacity:0.8">Hi?n chua có mă gi?m giá</p>';
    }

    // Posts
    const posts = PromotionModule.getAllPosts(true);
    const grid = document.getElementById('newsGrid');
    if (!posts.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">??</div><div class="empty-state-title">Chua có tin t?c</div></div>';
    } else {
      grid.innerHTML = posts.map(p => `
        <div class="news-card" onclick="openPost('${p.id}')" style="cursor:pointer">
          <div class="news-img"><img src="${p.images[0] || 'https://via.placeholder.com/600x338?text=News'}" alt="${p.title}" loading="lazy"></div>
          <div class="news-body">
            <div class="news-date">${formatDate(p.createdAt)}</div>
            <div class="news-title">${p.title}</div>
            <div class="news-excerpt">${p.content.replace(/<[^>]+>/g, '').slice(0, 150)}...</div>
            <div style="margin-top:12px;color:var(--primary);font-size:13px;font-weight:600">Đ?c thęm ?</div>
          </div>
        </div>`).join('');
    }

    function openPost(id) {
      const post = posts.find(p => p.id === id);
      if (!post) return;
      document.getElementById('modalTitle').textContent = post.title;
      document.getElementById('modalContent').innerHTML = post.content;
      const img = document.getElementById('modalImg');
      if (post.images[0]) { img.src = post.images[0]; img.style.display = 'block'; } else img.style.display = 'none';
      document.getElementById('postModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('postModal').style.display = 'none'; }
  </script>
</body>
</html>
