<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi ti?t s?n ph?m - LuxRent</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/customer.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    .product-detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    .product-gallery { position: sticky; top: 90px; }
    .main-img { aspect-ratio: 3/4; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
    .main-img img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-row { display: flex; gap: 8px; }
    .thumb { width: 70px; height: 90px; border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
    .thumb.active { border-color: var(--primary); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .size-options, .color-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .size-btn, .color-btn { padding: 8px 16px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; background: var(--white); transition: all 0.2s; }
    .size-btn:hover, .color-btn:hover { border-color: var(--primary); color: var(--primary); }
    .size-btn.selected, .color-btn.selected { border-color: var(--primary); background: var(--primary); color: var(--white); }
    .price-box { background: linear-gradient(135deg, rgba(124,58,237,0.05), rgba(236,72,153,0.05)); border-radius: var(--radius); padding: 20px; margin: 20px 0; border: 1px solid rgba(124,58,237,0.15); }
    @media (max-width: 768px) { .product-detail-layout { grid-template-columns: 1fr; } .product-gallery { position: static; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/index.html" class="navbar-brand"><img src="/assets/images/logo.png" alt="LuxRent" class="site-logo"></a>
      <div class="navbar-nav">
        <a href="/index.html" class="nav-link">Trang ch?</a>
        <a href="/customer/products.html" class="nav-link active">S?n ph?m</a>
        <a href="/customer/fitting-booking.html" class="nav-link">Đ?t l?ch th?</a>
        <a href="/customer/news.html" class="nav-link">Tin t?c</a>
      </div>
      <div class="navbar-actions">
        <a href="/customer/cart.html" class="cart-btn">?? Gi? hŕng <span class="cart-badge" style="display:none">0</span></a>
        <div class="user-menu" id="userMenu">
          <button class="user-btn" onclick="toggleUserMenu()"><span id="userMenuLabel">?? Đang nh?p</span> ?</button>
          <div class="user-dropdown" id="userDropdown" style="display:none">
            <div id="guestLinks"><a href="/customer/login.html">?? Đang nh?p</a></div>
            <div id="authLinks" style="display:none"><a href="/customer/profile.html">?? H? so</a><a href="/customer/orders.html">?? Đon hŕng</a><hr><a href="#" onclick="doLogout()">?? Đang xu?t</a></div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <div class="breadcrumb">
        <a href="/index.html">Trang ch?</a><span>›</span>
        <a href="/customer/products.html">S?n ph?m</a><span>›</span>
        <span id="breadcrumbName">Chi ti?t</span>
      </div>
      <div id="productContent"><div class="spinner"></div></div>
    </div>
  </section>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/product.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = StorageService.getSession();
    if (session) { document.getElementById('userMenuLabel').textContent = '?? ' + session.fullName; document.getElementById('guestLinks').style.display = 'none'; document.getElementById('authLinks').style.display = 'block'; CartModule.updateCartBadge(session.userId); }
    function toggleUserMenu() { const dd = document.getElementById('userDropdown'); dd.style.display = dd.style.display === 'none' ? 'block' : 'none'; }
    document.addEventListener('click', e => { if (!document.getElementById('userMenu').contains(e.target)) document.getElementById('userDropdown').style.display = 'none'; });
    function doLogout() { AuthModule.logout(); }

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    let selectedSize = '', selectedColor = '', rentalDays = 1;

    const product = ProductModule.getById(productId);
    if (!product) { document.getElementById('productContent').innerHTML = '<div class="empty-state"><div class="empty-state-icon">??</div><div class="empty-state-title">Không těm th?y s?n ph?m</div></div>'; }
    else {
      const cats = ProductModule.getCategories();
      const cat = cats.find(c => c.id === product.categoryId);
      document.getElementById('breadcrumbName').textContent = product.name;
      document.title = product.name + ' - LuxRent';

      const today = new Date().toISOString().slice(0, 10);
      const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0, 10);

      document.getElementById('productContent').innerHTML = `
        <div class="product-detail-layout">
          <div class="product-gallery">
            <div class="main-img"><img id="mainImg" src="${product.images[0] || 'https://via.placeholder.com/400x533?text=No+Image'}" alt="${product.name}"></div>
            <div class="thumb-row">${product.images.map((img, i) => `<div class="thumb ${i===0?'active':''}" onclick="setMainImg('${img}',this)"><img src="${img}" alt=""></div>`).join('')}</div>
          </div>
          <div>
            <div style="font-size:13px;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">${cat?.name || ''}</div>
            <h1 style="font-family:var(--font-display);font-size:28px;margin-bottom:12px">${product.name}</h1>
            <p style="color:var(--gray-500);font-size:15px;line-height:1.7;margin-bottom:20px">${product.description}</p>

            <div class="price-box">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                  <div style="font-size:13px;color:var(--gray-500)">Giá thuę</div>
                  <div style="font-size:28px;font-weight:700;color:var(--primary)">${formatCurrency(product.rentalPricePerDay)}<span style="font-size:14px;font-weight:400;color:var(--gray-400)">/ngŕy</span></div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:13px;color:var(--gray-500)">Ti?n c?c</div>
                  <div style="font-size:18px;font-weight:700;color:var(--warning)">${formatCurrency(product.depositAmount)}</div>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label style="font-weight:700">Ch?n size</label>
              <div class="size-options">${product.sizes.map(s => `<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`).join('')}</div>
            </div>

            <div class="form-group">
              <label style="font-weight:700">Ch?n mŕu s?c</label>
              <div class="color-options">${product.colors.map(c => `<button class="color-btn" onclick="selectColor('${c}',this)">${c}</button>`).join('')}</div>
            </div>

            <div class="form-group">
              <label style="font-weight:700">Ngŕy b?t d?u thuę</label>
              <input type="date" id="startDate" class="form-control" value="${today}" min="${today}" onchange="calcTotal()">
            </div>
            <div class="form-group">
              <label style="font-weight:700">Ngŕy k?t thúc thuę</label>
              <input type="date" id="endDate" class="form-control" value="${tomorrow}" min="${tomorrow}" onchange="calcTotal()">
            </div>

            <div id="totalBox" style="background:var(--gray-50);border-radius:var(--radius-sm);padding:14px;margin-bottom:20px;font-size:14px">
              <div style="display:flex;justify-content:space-between"><span>S? ngŕy thuę:</span><span id="daysCount" style="font-weight:600">1 ngŕy</span></div>
              <div style="display:flex;justify-content:space-between;margin-top:6px"><span>Ti?n thuę:</span><span id="rentalCost" style="font-weight:600;color:var(--primary)">${formatCurrency(product.rentalPricePerDay)}</span></div>
              <div style="display:flex;justify-content:space-between;margin-top:6px"><span>Ti?n c?c:</span><span style="font-weight:600;color:var(--warning)">${formatCurrency(product.depositAmount)}</span></div>
            </div>

            <div style="display:flex;gap:12px">
              <button class="btn btn-outline btn-lg" style="flex:1" onclick="goFitting()">?? Đ?t l?ch th?</button>
              <button class="btn btn-primary btn-lg" style="flex:2" onclick="addToCart()">?? Thęm vŕo gi? hŕng</button>
            </div>
          </div>
        </div>`;

      calcTotal();
    }

    function setMainImg(src, el) {
      document.getElementById('mainImg').src = src;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }
    function selectSize(s, el) { selectedSize = s; document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); }
    function selectColor(c, el) { selectedColor = c; document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); }
    function calcTotal() {
      const s = document.getElementById('startDate')?.value;
      const e = document.getElementById('endDate')?.value;
      if (!s || !e || !product) return;
      rentalDays = calcRentalDays(s, e);
      document.getElementById('daysCount').textContent = rentalDays + ' ngŕy';
      document.getElementById('rentalCost').textContent = formatCurrency(rentalDays * product.rentalPricePerDay);
    }
    function addToCart() {
      if (!session) { window.location.href = '/customer/login.html?redirect=' + encodeURIComponent(window.location.href); return; }
      if (!selectedSize) { Toast.show('Vui lňng ch?n size', 'warning'); return; }
      if (!selectedColor) { Toast.show('Vui lňng ch?n mŕu s?c', 'warning'); return; }
      const s = document.getElementById('startDate').value;
      const e = document.getElementById('endDate').value;
      if (!s || !e) { Toast.show('Vui lňng ch?n ngŕy thuę', 'warning'); return; }
      const result = CartModule.addItem(session.userId, product.id, selectedSize, selectedColor, s, e);
      if (result.error) { Toast.show(result.error, 'error'); return; }
      Toast.show('Đă thęm vŕo gi? hŕng!', 'success');
    }
    function goFitting() { window.location.href = '/customer/fitting-booking.html?productId=' + product.id; }
  </script>
</body>
</html>
