<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý đơn hàng - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">📦 Quản lý đơn thuê</div>
        <div class="topbar-actions" id="topbarActions"></div>
      </div>
      <div class="admin-content">
        <div class="table-container">
          <div class="table-header">
            <div class="table-search">
              <input type="text" id="searchInput" placeholder="Tìm mã đơn, tên KH, SĐT..." oninput="applyFilters()">
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <select id="statusFilter" class="form-control" style="width:160px;padding:8px 12px;font-size:13px" onchange="applyFilters()">
                <option value="">Tất cả trạng thái</option>
                <option value="cho_xac_nhan">Chờ xác nhận</option>
                <option value="da_xac_nhan">Đã xác nhận</option>
                <option value="dang_giao">Đang giao</option>
                <option value="da_giao">Đã giao</option>
                <option value="dang_thue">Đang thuê</option>
                <option value="da_tra_do">Đã trả đồ</option>
                <option value="da_huy">Đã hủy</option>
              </select>
            </div>
          </div>
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Sản phẩm</th><th>Tổng tiền</th><th>Trạng thái</th><th>Ngày tạo</th><th>Thao tác</th></tr></thead>
              <tbody id="ordersTable"></tbody>
            </table>
          </div>
          <div id="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="createModal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:600px">
      <div class="modal-header"><div class="modal-title">Tạo đơn thuê mới</div><button class="modal-close" onclick="closeCreateModal()">✕</button></div>
      <div class="form-group"><label>Tên khách hàng *</label><input type="text" id="newCustName" class="form-control"></div>
      <div class="form-row">
        <div class="form-group"><label>Số điện thoại *</label><input type="text" id="newCustPhone" class="form-control"></div>
        <div class="form-group"><label>Địa chỉ giao hàng *</label><input type="text" id="newAddress" class="form-control"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreateModal()">Hủy</button>
        <button class="btn btn-primary" onclick="createManualOrder()" style="background:var(--admin-primary)">Tạo đơn</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/order.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth();
    if (session) {
      document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('orders', session);
      const _canEdit = canEdit('orders', session.role);
      if (_canEdit) {
        document.getElementById('topbarActions').innerHTML = `<button class="topbar-btn topbar-btn-primary" onclick="openCreateModal()">+ Tạo đơn mới</button>`;
      }

      let currentPage = 1, allOrders = [];

      function applyFilters() {
        const search = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;
        allOrders = OrderModule.getRentalOrders({ search, status });
        currentPage = 1;
        renderTable();
      }

      function renderTable() {
        const paged = paginate(allOrders, currentPage);
        const tbody = document.getElementById('ordersTable');
        if (!paged.items.length) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">Không có đơn hàng nào</td></tr>';
        } else {
          tbody.innerHTML = paged.items.map(o => `
            <tr>
              <td><a href="/admin/order-detail.html?id=${o.id}" style="color:var(--admin-primary);font-weight:600">${o.orderRef}</a></td>
              <td><div style="font-weight:500">${o.customerName}</div><div style="font-size:12px;color:var(--gray-400)">${o.deliveryInfo?.phone || ''}</div></td>
              <td>${(o.items||[]).length} sản phẩm</td>
              <td style="font-weight:600">${formatCurrency(o.totalAmount)}</td>
              <td><span class="status-badge status-${o.status}">${STATUS_LABELS[o.status]||o.status}</span></td>
              <td>${formatDate(o.createdAt)}</td>
              <td class="table-actions-cell">
                <a href="/admin/order-detail.html?id=${o.id}" class="action-btn action-btn-view">Xem</a>
                ${_canEdit && o.status === 'cho_xac_nhan' ? `<button class="action-btn action-btn-edit" onclick="confirmOrder('${o.id}')">Xác nhận</button>` : ''}
                ${_canEdit && ['cho_xac_nhan','da_xac_nhan'].includes(o.status) ? `<button class="action-btn action-btn-delete" onclick="cancelOrder('${o.id}')">Hủy</button>` : ''}
              </td>
            </tr>`).join('');
        }
        renderPagination('pagination', paged, 'goPage');
      }

      window.goPage = (p) => { currentPage = p; renderTable(); };

      window.confirmOrder = (id) => {
        showConfirm('Xác nhận đơn hàng này?', () => {
          OrderModule.updateRentalStatus(id, 'da_xac_nhan', session.userId);
          Toast.show('Đã xác nhận đơn hàng', 'success');
          applyFilters();
        });
      };

      window.cancelOrder = (id) => {
        showConfirm('Hủy đơn hàng này?', () => {
          OrderModule.cancelRentalOrder(id, session.userId);
          Toast.show('Đã hủy đơn hàng', 'success');
          applyFilters();
        });
      };

      window.openCreateModal = () => document.getElementById('createModal').style.display = 'flex';
      window.closeCreateModal = () => document.getElementById('createModal').style.display = 'none';

      window.createManualOrder = () => {
        const name = document.getElementById('newCustName').value.trim();
        const phone = document.getElementById('newCustPhone').value.trim();
        const address = document.getElementById('newAddress').value.trim();
        if (!name || !phone || !address) { Toast.show('Vui lòng điền đầy đủ thông tin', 'warning'); return; }
        const result = OrderModule.createRentalOrder('walk_in_' + Date.now(), [], { recipientName: name, phone, address, preferredDeliveryDate: '' }, null, 0);
        closeCreateModal();
        Toast.show('Đã tạo đơn hàng', 'success');
        window.location.href = '/admin/order-detail.html?id=' + result.order.id;
      };

      applyFilters();
    }
  </script>
</body>
</html>
