<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">📊 Dashboard</div>
        <div class="topbar-actions">
          <span style="font-size:13px;color:var(--gray-500)" id="currentDate"></span>
        </div>
      </div>
      <div class="admin-content">
        <div class="stats-grid" id="statsGrid"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">
          <!-- Overdue Orders -->
          <div class="table-container">
            <div class="table-header"><span style="font-weight:700">⚠️ Đơn quá hạn trả</span></div>
            <div id="overdueList" style="padding:16px"></div>
          </div>
          <!-- Today's Tasks -->
          <div class="table-container">
            <div class="table-header"><span style="font-weight:700">📋 Công việc hôm nay</span></div>
            <div id="taskList" style="padding:16px"></div>
          </div>
        </div>

        <!-- Revenue Report -->
        <div class="table-container">
          <div class="table-header">
            <span style="font-weight:700">📈 Báo cáo doanh thu</span>
            <div style="display:flex;gap:8px">
              <button class="action-btn action-btn-view" onclick="loadReport('day')">Hôm nay</button>
              <button class="action-btn action-btn-view" onclick="loadReport('week')">Tuần này</button>
              <button class="action-btn action-btn-view" onclick="loadReport('month')">Tháng này</button>
            </div>
          </div>
          <div id="reportContent" style="padding:20px"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/order.js"></script>
  <script src="../assets/js/dashboard.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth();
    if (!session) { window.location.href = '/admin/login.html'; }
    else {
      document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('dashboard', session);
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      const summary = DashboardModule.getSummary();
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-icon blue">📦</div><div><div class="stat-value">${summary.activeOrders}</div><div class="stat-label">Đơn đang xử lý</div></div></div>
        <div class="stat-card"><div class="stat-icon green">📅</div><div><div class="stat-value">${summary.todayFittings}</div><div class="stat-label">Lịch thử hôm nay</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">⏰</div><div><div class="stat-value">${summary.dueSoon}</div><div class="stat-label">Sắp đến hạn (48h)</div></div></div>
        <div class="stat-card"><div class="stat-icon red">🚨</div><div><div class="stat-value">${summary.overdue}</div><div class="stat-label">Quá hạn trả</div></div></div>`;

      // Overdue
      const overdue = DashboardModule.getOverdueOrders();
      const overdueEl = document.getElementById('overdueList');
      if (!overdue.length) overdueEl.innerHTML = '<div class="empty-state" style="padding:20px"><div class="empty-state-icon">✅</div><div class="empty-state-title">Không có đơn quá hạn</div></div>';
      else overdueEl.innerHTML = overdue.map(o => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px"><div><div style="font-weight:600">${o.orderRef}</div><div style="color:var(--gray-500)">${o.customerName}</div></div><div style="text-align:right"><div style="color:var(--error);font-weight:600">Quá hạn</div><div style="color:var(--gray-400)">${formatDate(o.agreedReturnDate)}</div></div></div>`).join('');

      // Tasks
      const tasks = DashboardModule.getDailyTasks(session.userId, session.role);
      const taskEl = document.getElementById('taskList');
      if (!tasks.length) taskEl.innerHTML = '<div class="empty-state" style="padding:20px"><div class="empty-state-icon">✅</div><div class="empty-state-title">Không có công việc</div></div>';
      else taskEl.innerHTML = tasks.map(t => `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px"><span>${t.type === 'order' ? '📦' : t.type === 'fitting' ? '📅' : '🚚'}</span><span style="flex:1">${t.label}</span><a href="/admin/${t.type === 'fitting' ? 'fitting-bookings' : 'orders'}.html" style="color:var(--admin-primary);font-size:12px">Xem →</a></div>`).join('');

      loadReport('month');
    }

    function loadReport(period) {
      const report = DashboardModule.getRevenueReport(period);
      const labels = { day: 'Hôm nay', week: 'Tuần này', month: 'Tháng này' };
      document.getElementById('reportContent').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px">
          <div style="text-align:center;padding:16px;background:var(--gray-50);border-radius:var(--radius)"><div style="font-size:24px;font-weight:700;color:var(--admin-primary)">${report.count}</div><div style="font-size:13px;color:var(--gray-500)">Đơn hàng (${labels[period]})</div></div>
          <div style="text-align:center;padding:16px;background:var(--gray-50);border-radius:var(--radius)"><div style="font-size:24px;font-weight:700;color:var(--success)">${formatCurrency(report.revenue)}</div><div style="font-size:13px;color:var(--gray-500)">Doanh thu (${labels[period]})</div></div>
          <div style="text-align:center;padding:16px;background:var(--gray-50);border-radius:var(--radius)"><div style="font-size:24px;font-weight:700;color:var(--warning)">${report.count ? Math.round(report.revenue / report.count).toLocaleString('vi-VN') : 0}đ</div><div style="font-size:13px;color:var(--gray-500)">Trung bình/đơn</div></div>
        </div>`;
    }
  </script>
</body>
</html>
