<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mã khuyến mãi - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    .detail-panel{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,0.15);z-index:200;transition:right 0.3s;display:flex;flex-direction:column}
    .detail-panel.open{right:0}
    .detail-panel-header{padding:20px 24px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
    .detail-panel-body{flex:1;overflow-y:auto;padding:24px}
    .detail-panel-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;gap:10px;justify-content:flex-end}
    .panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:199}
    .panel-overlay.show{display:block}
    .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:14px}
    .detail-row:last-child{border-bottom:none}
    .detail-label{color:var(--gray-500);font-weight:500}
    .detail-value{font-weight:600;color:var(--gray-800);text-align:right}
  </style>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">� Mã khuyến mãi</div>
        <div class="topbar-actions" id="topbarActions"></div>
      </div>
      <div class="admin-content">
        <div class="table-container">
          <div class="table-header">
            <div class="table-search"><input type="text" id="searchInput" placeholder="Tìm mã khuyến mãi..." oninput="applyFilters()"></div>
            <select id="statusFilter" class="form-control" style="width:160px;padding:8px 12px;font-size:13px" onchange="applyFilters()">
              <option value="">Tất cả</option>
              <option value="active">Đang hoạt động</option>
              <option value="scheduled">Sắp diễn ra</option>
              <option value="expired">Đã hết hạn</option>
            </select>
          </div>
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead><tr><th>Mã</th><th>Loại giảm</th><th>Giá trị</th><th>Đơn tối thiểu</th><th>Thời gian</th><th>Trạng thái</th><th>Chi tiết</th></tr></thead>
              <tbody id="promoTable"></tbody>
            </table>
          </div>
          <div id="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Detail Panel -->
  <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-panel-header">
      <div style="font-weight:700;font-size:16px" id="panelTitle">Chi tiết mã khuyến mãi</div>
      <button onclick="closePanel()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400)">✕</button>
    </div>
    <div class="detail-panel-body" id="panelBody"></div>
    <div class="detail-panel-footer" id="panelFooter"></div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="promoModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header"><div class="modal-title" id="modalTitle">Thêm mã khuyến mãi</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group"><label>Mã giảm giá *</label><input type="text" id="pCode" class="form-control" placeholder="SUMMER20" style="text-transform:uppercase"></div>
        <div class="form-group"><label>Loại giảm *</label>
          <select id="pType" class="form-control"><option value="percentage">Phần trăm (%)</option><option value="fixed">Số tiền cố định (đ)</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Giá trị giảm *</label><input type="number" id="pValue" class="form-control" min="0"></div>
        <div class="form-group"><label>Đơn hàng tối thiểu (đ)</label><input type="number" id="pMinOrder" class="form-control" min="0" value="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Ngày bắt đầu *</label><input type="date" id="pStart" class="form-control"></div>
        <div class="form-group"><label>Ngày kết thúc *</label><input type="date" id="pEnd" class="form-control"></div>
      </div>
      <div id="modalError" class="alert alert-error" style="display:none"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="savePromo()" style="background:var(--admin-primary)">Lưu</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/promotion.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth();
    if (!session) throw new Error('No session');
    document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('promotions', session);
    const _canEdit = canEdit('promotions', session.role);
    if (_canEdit) document.getElementById('topbarActions').innerHTML = '<button class="topbar-btn topbar-btn-primary" onclick="openModal()">+ Thêm mã</button>';

    let currentPage = 1, allCodes = [];

    function getPromoStatus(p) {
      const now = new Date();
      if (new Date(p.startDate) > now) return { key: 'scheduled', label: 'Sắp diễn ra', cls: 'cho_xac_nhan' };
      if (new Date(p.endDate) < now) return { key: 'expired', label: 'Đã hết hạn', cls: 'da_huy' };
      return { key: 'active', label: 'Đang hoạt động', cls: 'da_xac_nhan' };
    }

    function applyFilters() {
      const search = document.getElementById('searchInput').value;
      const statusFilter = document.getElementById('statusFilter').value;
      allCodes = PromotionModule.getAllCodes({ search, status: statusFilter });
      currentPage = 1; renderTable();
    }

    function renderTable() {
      const paged = paginate(allCodes, currentPage);
      const tbody = document.getElementById('promoTable');
      if (!paged.items.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">Không có mã khuyến mãi</td></tr>'; }
      else tbody.innerHTML = paged.items.map(p => {
        const st = getPromoStatus(p);
        return `<tr>
          <td><span style="font-weight:700;font-size:15px;letter-spacing:1px;color:var(--admin-primary)">${p.code}</span></td>
          <td>${p.discountType === 'percentage' ? 'Phần trăm' : 'Cố định'}</td>
          <td style="font-weight:600">${p.discountType === 'percentage' ? p.discountValue + '%' : formatCurrency(p.discountValue)}</td>
          <td>${formatCurrency(p.minOrderValue)}</td>
          <td style="font-size:12px">${formatDate(p.startDate)} - ${formatDate(p.endDate)}</td>
          <td><span class="status-badge status-${st.cls}">${st.label}</span></td>
          <td><button class="action-btn action-btn-view" onclick="openDetail('${p.id}')">Xem chi tiết</button></td>
        </tr>`;
      }).join('');
      renderPagination('pagination', paged, 'goPage');
    }

    function goPage(p) { currentPage = p; renderTable(); }

    function openDetail(id) {
      const p = StorageService.getById('crb_promotions', id);
      if (!p) return;
      const st = getPromoStatus(p);
      document.getElementById('panelTitle').textContent = p.code;
      document.getElementById('panelBody').innerHTML = `
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:32px;font-weight:800;letter-spacing:3px;color:var(--admin-primary);background:rgba(21,101,192,0.08);padding:16px;border-radius:var(--radius)">${p.code}</div>
        </div>
        <div class="detail-row"><span class="detail-label">Loại giảm</span><span class="detail-value">${p.discountType === 'percentage' ? 'Phần trăm (%)' : 'Số tiền cố định'}</span></div>
        <div class="detail-row"><span class="detail-label">Giá trị giảm</span><span class="detail-value" style="color:var(--success)">${p.discountType === 'percentage' ? p.discountValue + '%' : formatCurrency(p.discountValue)}</span></div>
        <div class="detail-row"><span class="detail-label">Đơn hàng tối thiểu</span><span class="detail-value">${formatCurrency(p.minOrderValue)}</span></div>
        <div class="detail-row"><span class="detail-label">Ngày bắt đầu</span><span class="detail-value">${formatDate(p.startDate)}</span></div>
        <div class="detail-row"><span class="detail-label">Ngày kết thúc</span><span class="detail-value">${formatDate(p.endDate)}</span></div>
        <div class="detail-row"><span class="detail-label">Đã sử dụng</span><span class="detail-value">${p.usageCount || 0} lần</span></div>
        <div class="detail-row"><span class="detail-label">Trạng thái</span><span class="detail-value"><span class="status-badge status-${st.cls}">${st.label}</span></span></div>`;
      const footer = document.getElementById('panelFooter');
      if (_canEdit) {
        footer.innerHTML = `
          <button class="btn btn-danger btn-sm" onclick="deletePromo('${p.id}')">Xóa</button>
          <button class="btn btn-primary btn-sm" onclick="openEdit('${p.id}')" style="background:var(--admin-primary)">Chỉnh sửa</button>`;
      } else {
        footer.innerHTML = '<span style="font-size:13px;color:var(--gray-400)">Bạn chỉ có quyền xem</span>';
      }
      document.getElementById('detailPanel').classList.add('open');
      document.getElementById('panelOverlay').classList.add('show');
    }

    function closePanel() { document.getElementById('detailPanel').classList.remove('open'); document.getElementById('panelOverlay').classList.remove('show'); }

    function openModal() {
      document.getElementById('editId').value = '';
      ['pCode','pValue','pMinOrder'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('pType').value = 'percentage';
      document.getElementById('pStart').value = '';
      document.getElementById('pEnd').value = '';
      document.getElementById('modalTitle').textContent = 'Thêm mã khuyến mãi';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('promoModal').style.display = 'flex';
    }

    function openEdit(id) {
      closePanel();
      const p = StorageService.getById('crb_promotions', id);
      if (!p) return;
      document.getElementById('editId').value = id;
      document.getElementById('pCode').value = p.code;
      document.getElementById('pType').value = p.discountType;
      document.getElementById('pValue').value = p.discountValue;
      document.getElementById('pMinOrder').value = p.minOrderValue;
      document.getElementById('pStart').value = p.startDate?.slice(0,10);
      document.getElementById('pEnd').value = p.endDate?.slice(0,10);
      document.getElementById('modalTitle').textContent = 'Sửa mã khuyến mãi';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('promoModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('promoModal').style.display = 'none'; }

    function savePromo() {
      const errEl = document.getElementById('modalError');
      const id = document.getElementById('editId').value;
      const data = {
        code: document.getElementById('pCode').value.trim().toUpperCase(),
        discountType: document.getElementById('pType').value,
        discountValue: document.getElementById('pValue').value,
        minOrderValue: document.getElementById('pMinOrder').value,
        startDate: document.getElementById('pStart').value,
        endDate: document.getElementById('pEnd').value
      };
      if (!data.code || !data.discountValue || !data.startDate || !data.endDate) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display = 'flex'; return; }
      showConfirm(id ? 'Cập nhật mã khuyến mãi?' : 'Thêm mã khuyến mãi mới?', () => {
        const result = id ? PromotionModule.updateCode(id, data) : PromotionModule.createCode(data);
        if (result.error) { errEl.textContent = result.error; errEl.style.display = 'flex'; return; }
        Toast.show(id ? 'Đã cập nhật mã' : 'Đã thêm mã khuyến mãi', 'success');
        closeModal(); applyFilters();
      });
    }

    function deletePromo(id) {
      showConfirm('Xóa mã khuyến mãi này?', () => {
        PromotionModule.deleteCode(id);
        Toast.show('Đã xóa mã khuyến mãi', 'success');
        closePanel(); applyFilters();
      });
    }

    applyFilters();
  </script>
</body>
</html>
