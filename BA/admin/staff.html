<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhân viên - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">👤 Quản lý nhân viên</div>
        <div class="topbar-actions">
          <button class="topbar-btn topbar-btn-primary" onclick="openModal()">+ Thêm nhân viên</button>
        </div>
      </div>
      <div class="admin-content">
        <div class="table-container">
          <div class="table-header"><span style="font-weight:600">Danh sách nhân viên</span></div>
          <table class="admin-table">
            <thead><tr><th>Họ tên</th><th>Email / SĐT</th><th>Vai trò</th><th>Trạng thái</th><th>Ngày tạo</th><th>Thao tác</th></tr></thead>
            <tbody id="staffTable"></tbody>
          </table>
        </div>

        <div class="table-container" style="margin-top:24px">
          <div class="table-header"><span style="font-weight:600">📋 Nhật ký thay đổi vai trò</span></div>
          <table class="admin-table">
            <thead><tr><th>Nhân viên</th><th>Vai trò cũ</th><th>Vai trò mới</th><th>Người thay đổi</th><th>Thời gian</th></tr></thead>
            <tbody id="auditTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Staff Modal -->
  <div id="staffModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header"><div class="modal-title" id="modalTitle">Thêm nhân viên</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <input type="hidden" id="editId">
      <div class="form-group"><label>Họ và tên *</label><input type="text" id="sName" class="form-control"></div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input type="email" id="sEmail" class="form-control"></div>
        <div class="form-group"><label>Số điện thoại</label><input type="tel" id="sPhone" class="form-control"></div>
      </div>
      <div class="form-group"><label>Vai trò *</label>
        <select id="sRole" class="form-control">
          <option value="manager">Quản lý</option>
          <option value="accountant">Kế toán</option>
          <option value="warehouse">Nhân viên kho</option>
          <option value="sales">Nhân viên bán hàng</option>
          <option value="marketing">Marketing</option>
        </select>
      </div>
      <div id="modalError" class="alert alert-error" style="display:none"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="saveStaff()" style="background:var(--admin-primary)">Lưu</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth(['admin']);
    if (session) document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('staff', session);

    const ROLE_LABELS = { admin: 'Quản trị viên', manager: 'Quản lý', accountant: 'Kế toán', warehouse: 'Nhân viên kho', sales: 'Nhân viên bán hàng', marketing: 'Marketing' };

    function renderTable() {
      const staff = StorageService.getAll('crb_users').filter(u => u.role !== 'customer' && !u.deleted);
      const tbody = document.getElementById('staffTable');
      tbody.innerHTML = staff.map(s => `
        <tr>
          <td style="font-weight:600">${s.fullName}</td>
          <td>${s.email || s.phone}</td>
          <td><span class="tag tag-primary">${ROLE_LABELS[s.role] || s.role}</span></td>
          <td><span class="status-badge status-${s.isActive ? 'da_xac_nhan' : 'da_huy'}">${s.isActive ? 'Hoạt động' : 'Đã khóa'}</span></td>
          <td>${formatDate(s.createdAt)}</td>
          <td class="table-actions-cell">
            ${s.id !== session.userId ? `<button class="action-btn action-btn-edit" onclick="openEdit('${s.id}')">Sửa</button>` : ''}
            ${s.id !== session.userId ? `<button class="action-btn action-btn-delete" onclick="toggleActive('${s.id}',${s.isActive})">${s.isActive ? 'Khóa' : 'Mở khóa'}</button>` : ''}
          </td>
        </tr>`).join('');

      // Audit log
      const logs = StorageService.getAll('crb_audit_log').slice(-20).reverse();
      const auditTbody = document.getElementById('auditTable');
      if (!logs.length) { auditTbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--gray-400)">Chưa có nhật ký</td></tr>'; return; }
      auditTbody.innerHTML = logs.map(l => {
        const target = StorageService.getById('crb_users', l.entityId);
        const changer = StorageService.getById('crb_users', l.changedBy);
        return `<tr>
          <td>${target?.fullName || l.entityId}</td>
          <td><span class="tag">${ROLE_LABELS[l.previousValue] || l.previousValue}</span></td>
          <td><span class="tag tag-primary">${ROLE_LABELS[l.newValue] || l.newValue}</span></td>
          <td>${changer?.fullName || l.changedBy}</td>
          <td style="font-size:12px">${new Date(l.timestamp).toLocaleString('vi-VN')}</td>
        </tr>`;
      }).join('');
    }

    function openModal() { document.getElementById('editId').value = ''; ['sName','sEmail','sPhone'].forEach(id => document.getElementById(id).value = ''); document.getElementById('sRole').value = 'sales'; document.getElementById('modalTitle').textContent = 'Thêm nhân viên'; document.getElementById('modalError').style.display = 'none'; document.getElementById('staffModal').style.display = 'flex'; }
    function openEdit(id) {
      const s = StorageService.getById('crb_users', id);
      if (!s) return;
      document.getElementById('editId').value = id;
      document.getElementById('sName').value = s.fullName;
      document.getElementById('sEmail').value = s.email;
      document.getElementById('sPhone').value = s.phone;
      document.getElementById('sRole').value = s.role;
      document.getElementById('modalTitle').textContent = 'Sửa nhân viên';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('staffModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('staffModal').style.display = 'none'; }

    function saveStaff() {
      const errEl = document.getElementById('modalError');
      const id = document.getElementById('editId').value;
      const name = document.getElementById('sName').value.trim();
      const email = document.getElementById('sEmail').value.trim();
      const phone = document.getElementById('sPhone').value.trim();
      const role = document.getElementById('sRole').value;
      if (!name || (!email && !phone)) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display = 'flex'; return; }

      if (id) {
        const existing = StorageService.getById('crb_users', id);
        if (existing.role !== role) {
          StorageService.save('crb_audit_log', { entityType: 'user_role', entityId: id, changedBy: session.userId, previousValue: existing.role, newValue: role, timestamp: new Date().toISOString() });
        }
        StorageService.update('crb_users', id, { fullName: name, email, phone, role });
      } else {
        StorageService.save('crb_users', { fullName: name, email, phone, role, passwordHash: btoa('Default@123_crb_salt'), isActive: true, deleted: false, loyaltyPoints: 0, bankAccount: { bankName: '', accountNumber: '' }, avatar: '', address: '' });
      }
      Toast.show(id ? 'Đã cập nhật nhân viên' : 'Đã thêm nhân viên (mật khẩu: Default@123)', 'success');
      closeModal();
      renderTable();
    }

    function toggleActive(id, isActive) {
      showConfirm(isActive ? 'Khóa tài khoản này?' : 'Mở khóa tài khoản này?', () => {
        StorageService.update('crb_users', id, { isActive: !isActive });
        Toast.show(isActive ? 'Đã khóa tài khoản' : 'Đã mở khóa tài khoản', 'success');
        renderTable();
      });
    }

    renderTable();
  </script>
</body>
</html>
