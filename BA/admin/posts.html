<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài viết - LuxRent Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <div id="sidebarContainer"></div>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title">📰 Quản lý bài viết</div>
        <div class="topbar-actions">
          <button class="topbar-btn topbar-btn-primary" onclick="openModal()">+ Tạo bài viết</button>
        </div>
      </div>
      <div class="admin-content">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px" id="postsGrid">
          <div class="spinner"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="postModal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:650px">
      <div class="modal-header"><div class="modal-title" id="modalTitle">Tạo bài viết</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <input type="hidden" id="editId">
      <div class="form-group"><label>Tiêu đề *</label><input type="text" id="pTitle" class="form-control"></div>
      <div class="form-group"><label>Nội dung *</label><textarea id="pContent" class="form-control" rows="6" placeholder="Nội dung bài viết..."></textarea></div>
      <div class="form-group"><label>URL ảnh (mỗi dòng một URL)</label><textarea id="pImages" class="form-control" rows="2" placeholder="https://..."></textarea></div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="pPublished" checked>
        <label for="pPublished" style="margin:0;cursor:pointer">Đăng công khai</label>
      </div>
      <div id="modalError" class="alert alert-error" style="display:none"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="savePost()" style="background:var(--admin-primary)">Lưu</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/promotion.js"></script>
  <script src="../assets/js/admin-common.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script>
    const session = AuthModule.requireAdminAuth(['admin','manager','marketing']);
    if (session) document.getElementById('sidebarContainer').innerHTML = renderAdminSidebar('posts', session);

    function renderPosts() {
      const posts = PromotionModule.getAllPosts();
      const grid = document.getElementById('postsGrid');
      if (!posts.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📰</div><div class="empty-state-title">Chưa có bài viết</div></div>'; return; }
      grid.innerHTML = posts.map(p => `
        <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-200);overflow:hidden;box-shadow:var(--shadow-sm)">
          ${p.images[0] ? `<img src="${p.images[0]}" style="width:100%;height:160px;object-fit:cover">` : '<div style="height:80px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:32px">📰</div>'}
          <div style="padding:16px">
            <div style="font-weight:700;font-size:15px;margin-bottom:6px">${p.title}</div>
            <div style="font-size:12px;color:var(--gray-400);margin-bottom:8px">${formatDate(p.createdAt)}</div>
            <div style="font-size:13px;color:var(--gray-500);margin-bottom:12px">${p.content.replace(/<[^>]+>/g,'').slice(0,100)}...</div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="status-badge status-${p.isPublished ? 'da_xac_nhan' : 'da_huy'}">${p.isPublished ? '✅ Đã đăng' : '⏸ Ẩn'}</span>
              <div style="display:flex;gap:6px">
                <button class="action-btn action-btn-edit" onclick="openEdit('${p.id}')">Sửa</button>
                <button class="action-btn action-btn-delete" onclick="deletePost('${p.id}')">Xóa</button>
              </div>
            </div>
          </div>
        </div>`).join('');
    }

    function openModal() { document.getElementById('editId').value = ''; ['pTitle','pContent','pImages'].forEach(id => document.getElementById(id).value = ''); document.getElementById('pPublished').checked = true; document.getElementById('modalTitle').textContent = 'Tạo bài viết'; document.getElementById('modalError').style.display = 'none'; document.getElementById('postModal').style.display = 'flex'; }
    function openEdit(id) {
      const p = StorageService.getById('crb_posts', id);
      if (!p) return;
      document.getElementById('editId').value = id;
      document.getElementById('pTitle').value = p.title;
      document.getElementById('pContent').value = p.content;
      document.getElementById('pImages').value = (p.images||[]).join('\n');
      document.getElementById('pPublished').checked = p.isPublished;
      document.getElementById('modalTitle').textContent = 'Sửa bài viết';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('postModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('postModal').style.display = 'none'; }

    function savePost() {
      const errEl = document.getElementById('modalError');
      const id = document.getElementById('editId').value;
      const data = { title: document.getElementById('pTitle').value.trim(), content: document.getElementById('pContent').value.trim(), images: document.getElementById('pImages').value.split('\n').map(s=>s.trim()).filter(Boolean), isPublished: document.getElementById('pPublished').checked };
      if (!data.title || !data.content) { errEl.textContent = 'Vui lòng điền tiêu đề và nội dung'; errEl.style.display = 'flex'; return; }
      const result = id ? PromotionModule.updatePost(id, data) : PromotionModule.createPost(data);
      if (result.error) { errEl.textContent = result.error; errEl.style.display = 'flex'; return; }
      Toast.show(id ? 'Đã cập nhật bài viết' : 'Đã đăng bài viết', 'success');
      closeModal();
      renderPosts();
    }

    function deletePost(id) {
      showConfirm('Xóa bài viết này?', () => {
        PromotionModule.deletePost(id);
        Toast.show('Đã xóa bài viết', 'success');
        renderPosts();
      });
    }

    renderPosts();
  </script>
</body>
</html>
